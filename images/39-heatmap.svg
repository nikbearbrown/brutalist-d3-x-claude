<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="700" height="500" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="18" font-weight="600" fill="#2a1a0e">AI Adoption Score by Region and Sector</text>

  <!-- Chart area -->
  <rect x="32" y="42" width="636" height="350" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="0.75" rx="0"/>

  <!-- Grid layout: 5 rows x 4 columns -->
  <!-- Row labels on left, column headers on top -->
  <!-- Grid area: x from 200 to 620 (420px / 4 cols = 105px each) -->
  <!-- Grid area: y from 90 to 350 (260px / 5 rows = 52px each) -->

  <!-- Column headers -->
  <text x="252.5" y="78" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">FINANCE</text>
  <text x="357.5" y="78" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">RESEARCH</text>
  <text x="462.5" y="78" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">HEALTHCARE</text>
  <text x="567.5" y="78" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">HUMANITARIAN</text>

  <!-- Row labels -->
  <text x="195" y="120" text-anchor="end" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" fill="#2a1a0e">North America</text>
  <text x="195" y="172" text-anchor="end" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" fill="#2a1a0e">Europe</text>
  <text x="195" y="224" text-anchor="end" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" fill="#2a1a0e">East Asia</text>
  <text x="195" y="276" text-anchor="end" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" fill="#2a1a0e">Sub-Saharan Africa</text>
  <text x="195" y="328" text-anchor="end" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" fill="#2a1a0e">MENA</text>

  <!-- Heatmap cells -->
  <!-- Color scale: 0=#F5EFE8, 100=#2a1a0e (sequential luminance) -->
  <!-- Data (approximate adoption scores): -->
  <!-- N.America: Finance=92, Research=88, Healthcare=72, Humanitarian=35 -->
  <!-- Europe:    Finance=85, Research=82, Healthcare=68, Humanitarian=38 -->
  <!-- E.Asia:    Finance=80, Research=78, Healthcare=60, Humanitarian=28 -->
  <!-- SSAfrica:  Finance=32, Research=30, Healthcare=22, Humanitarian=14 -->
  <!-- MENA:      Finance=55, Research=50, Healthcare=42, Humanitarian=20 -->

  <!-- Color mapping (linear interpolation #F5EFE8 to #2a1a0e): -->
  <!-- score 92 => very dark ~#3a2815 -->
  <!-- score 88 => dark ~#42301c -->
  <!-- score 85 => dark ~#483620 -->
  <!-- score 82 => ~#4e3c24 -->
  <!-- score 80 => ~#524028 -->
  <!-- score 78 => ~#56442c -->
  <!-- score 72 => ~#624e34 -->
  <!-- score 68 => ~#6a5640 -->
  <!-- score 60 => ~#7a6650 -->
  <!-- score 55 => ~#856f58 -->
  <!-- score 50 => ~#907a62 -->
  <!-- score 42 => ~#a08a70 -->
  <!-- score 38 => ~#a89078 -->
  <!-- score 35 => ~#b09880 -->
  <!-- score 32 => ~#b49c84 -->
  <!-- score 30 => ~#b8a088 -->
  <!-- score 28 => ~#bca48c -->
  <!-- score 22 => ~#c8b098 -->
  <!-- score 20 => ~#ccb49c -->
  <!-- score 14 => ~#d8c0a8 -->

  <!-- Row 1: North America -->
  <rect x="200" y="94" width="105" height="52" fill="#3a2815" stroke="#FFFFFF" stroke-width="1.5" rx="0"/>
  <text x="252.5" y="124" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="500" fill="#F5EFE8">92</text>

  <rect x="305" y="94" width="105" height="52" fill="#42301c" stroke="#FFFFFF" stroke-width="1.5" rx="0"/>
  <text x="357.5" y="124" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="500" fill="#F5EFE8">88</text>

  <rect x="410" y="94" width="105" height="52" fill="#624e34" stroke="#FFFFFF" stroke-width="1.5" rx="0"/>
  <text x="462.5" y="124" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="500" fill="#F5EFE8">72</text>

  <rect x="515" y="94" width="105" height="52" fill="#b09880" stroke="#FFFFFF" stroke-width="1.5" rx="0"/>
  <text x="567.5" y="124" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="500" fill="#2a1a0e">35</text>

  <!-- Row 2: Europe -->
  <rect x="200" y="146" width="105" height="52" fill="#483620" stroke="#FFFFFF" stroke-width="1.5" rx="0"/>
  <text x="252.5" y="176" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="500" fill="#F5EFE8">85</text>

  <rect x="305" y="146" width="105" height="52" fill="#4e3c24" stroke="#FFFFFF" stroke-width="1.5" rx="0"/>
  <text x="357.5" y="176" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="500" fill="#F5EFE8">82</text>

  <rect x="410" y="146" width="105" height="52" fill="#6a5640" stroke="#FFFFFF" stroke-width="1.5" rx="0"/>
  <text x="462.5" y="176" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="500" fill="#F5EFE8">68</text>

  <rect x="515" y="146" width="105" height="52" fill="#a89078" stroke="#FFFFFF" stroke-width="1.5" rx="0"/>
  <text x="567.5" y="176" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="500" fill="#2a1a0e">38</text>

  <!-- Row 3: East Asia -->
  <rect x="200" y="198" width="105" height="52" fill="#524028" stroke="#FFFFFF" stroke-width="1.5" rx="0"/>
  <text x="252.5" y="228" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="500" fill="#F5EFE8">80</text>

  <rect x="305" y="198" width="105" height="52" fill="#56442c" stroke="#FFFFFF" stroke-width="1.5" rx="0"/>
  <text x="357.5" y="228" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="500" fill="#F5EFE8">78</text>

  <rect x="410" y="198" width="105" height="52" fill="#7a6650" stroke="#FFFFFF" stroke-width="1.5" rx="0"/>
  <text x="462.5" y="228" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="500" fill="#F5EFE8">60</text>

  <rect x="515" y="198" width="105" height="52" fill="#bca48c" stroke="#FFFFFF" stroke-width="1.5" rx="0"/>
  <text x="567.5" y="228" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="500" fill="#2a1a0e">28</text>

  <!-- Row 4: Sub-Saharan Africa -->
  <rect x="200" y="250" width="105" height="52" fill="#b49c84" stroke="#FFFFFF" stroke-width="1.5" rx="0"/>
  <text x="252.5" y="280" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="500" fill="#2a1a0e">32</text>

  <rect x="305" y="250" width="105" height="52" fill="#b8a088" stroke="#FFFFFF" stroke-width="1.5" rx="0"/>
  <text x="357.5" y="280" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="500" fill="#2a1a0e">30</text>

  <rect x="410" y="250" width="105" height="52" fill="#c8b098" stroke="#FFFFFF" stroke-width="1.5" rx="0"/>
  <text x="462.5" y="280" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="500" fill="#2a1a0e">22</text>

  <rect x="515" y="250" width="105" height="52" fill="#d8c0a8" stroke="#FFFFFF" stroke-width="1.5" rx="0"/>
  <text x="567.5" y="280" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="500" fill="#2a1a0e">14</text>

  <!-- Row 5: MENA -->
  <rect x="200" y="302" width="105" height="52" fill="#856f58" stroke="#FFFFFF" stroke-width="1.5" rx="0"/>
  <text x="252.5" y="332" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="500" fill="#F5EFE8">55</text>

  <rect x="305" y="302" width="105" height="52" fill="#907a62" stroke="#FFFFFF" stroke-width="1.5" rx="0"/>
  <text x="357.5" y="332" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="500" fill="#F5EFE8">50</text>

  <rect x="410" y="302" width="105" height="52" fill="#a08a70" stroke="#FFFFFF" stroke-width="1.5" rx="0"/>
  <text x="462.5" y="332" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="500" fill="#2a1a0e">42</text>

  <rect x="515" y="302" width="105" height="52" fill="#ccb49c" stroke="#FFFFFF" stroke-width="1.5" rx="0"/>
  <text x="567.5" y="332" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="500" fill="#2a1a0e">20</text>

  <!-- Color scale legend -->
  <text x="200" y="370" text-anchor="start" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454" letter-spacing="0.08em">LOW</text>
  <rect x="225" y="362" width="20" height="12" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="0.5" rx="0"/>
  <rect x="245" y="362" width="20" height="12" fill="#d8c0a8" stroke="#D4D4D4" stroke-width="0.5" rx="0"/>
  <rect x="265" y="362" width="20" height="12" fill="#b09880" stroke="#D4D4D4" stroke-width="0.5" rx="0"/>
  <rect x="285" y="362" width="20" height="12" fill="#856f58" stroke="#D4D4D4" stroke-width="0.5" rx="0"/>
  <rect x="305" y="362" width="20" height="12" fill="#56442c" stroke="#D4D4D4" stroke-width="0.5" rx="0"/>
  <rect x="325" y="362" width="20" height="12" fill="#2a1a0e" stroke="#D4D4D4" stroke-width="0.5" rx="0"/>
  <text x="350" y="370" text-anchor="start" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454" letter-spacing="0.08em">HIGH</text>

  <!-- Caption -->
  <text x="350" y="408" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-style="italic" fill="#545454">Sequential luminance encodes intensity. Finance and research lead.</text>
</svg>
