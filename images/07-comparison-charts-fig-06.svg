<svg viewBox="0 0 700 360" xmlns="http://www.w3.org/2000/svg" font-family="'EB Garamond', Georgia, 'Times New Roman', serif">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
  </marker>
</defs>

<!-- Background -->
<rect width="700" height="360" fill="#FFFFFF"/>

<!-- Title -->
<text x="350" y="26" text-anchor="middle" font-size="15" fill="#2a1a0e" font-weight="bold">Radial vs. Linear Bar Charts</text>

<!-- LEFT PANEL: Radial bar chart -->
<rect x="32" y="40" width="300" height="270" fill="#F5EFE8" stroke="#D4D4D4" rx="0"/>
<text x="182" y="58" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">RADIAL BARS</text>

<!-- Radial chart centered at 182, 180, radius range 30-110 -->
<!-- Concentric guide circles -->
<circle cx="182" cy="180" r="30" fill="none" stroke="#D4D4D4" stroke-dasharray="4 3"/>
<circle cx="182" cy="180" r="50" fill="none" stroke="#D4D4D4" stroke-dasharray="4 3"/>
<circle cx="182" cy="180" r="70" fill="none" stroke="#D4D4D4" stroke-dasharray="4 3"/>
<circle cx="182" cy="180" r="90" fill="none" stroke="#D4D4D4" stroke-dasharray="4 3"/>
<circle cx="182" cy="180" r="110" fill="none" stroke="#D4D4D4" stroke-dasharray="4 3"/>

<!-- 8 radial bars at 45-degree intervals -->
<!-- Values: 92, 85, 78, 64, 55, 47, 38, 30 -->
<!-- Bar angular width ~30deg, each sector 45deg -->
<!-- Using path arcs for radial bars -->
<!-- Simplified with rect-like wedges using lines from center -->
<!-- Bar 1: 92% => r=30 + 0.92*80 = 103.6, angle 0deg (top) -->
<line x1="182" y1="150" x2="182" y2="76.4" stroke="#6B3520" stroke-width="16"/>
<!-- Bar 2: 85% => r=98, angle 45deg -->
<line x1="182" y1="180" x2="240" y2="122" stroke="#6B3520" stroke-width="16" transform="rotate(0, 182, 180)"/>
<!-- Using a cleaner approach with rotated rects -->
<g transform="translate(182, 180)">
  <!-- Bar 1 (top): 92 => length=73.6 -->
  <rect x="-8" y="-103.6" width="16" height="73.6" fill="#6B3520" rx="0"/>
  <!-- Bar 2 (45deg): 85 => length=68 -->
  <rect x="-8" y="-98" width="16" height="68" fill="#6B3520" rx="0" transform="rotate(45)"/>
  <!-- Bar 3 (90deg): 78 => length=62.4 -->
  <rect x="-8" y="-92.4" width="16" height="62.4" fill="#6B3520" rx="0" transform="rotate(90)"/>
  <!-- Bar 4 (135deg): 64 => length=51.2 -->
  <rect x="-8" y="-81.2" width="16" height="51.2" fill="#6B3520" rx="0" transform="rotate(135)"/>
  <!-- Bar 5 (180deg): 55 => length=44 -->
  <rect x="-8" y="-74" width="16" height="44" fill="#6B3520" rx="0" transform="rotate(180)"/>
  <!-- Bar 6 (225deg): 47 => length=37.6 -->
  <rect x="-8" y="-67.6" width="16" height="37.6" fill="#6B3520" rx="0" transform="rotate(225)"/>
  <!-- Bar 7 (270deg): 38 => length=30.4 -->
  <rect x="-8" y="-60.4" width="16" height="30.4" fill="#6B3520" rx="0" transform="rotate(270)"/>
  <!-- Bar 8 (315deg): 30 => length=24 -->
  <rect x="-8" y="-54" width="16" height="24" fill="#6B3520" rx="0" transform="rotate(315)"/>
</g>

<!-- Labels around radial chart -->
<text x="182" y="67" text-anchor="middle" font-size="7" fill="#545454">92</text>
<text x="272" y="112" text-anchor="middle" font-size="7" fill="#545454">85</text>
<text x="300" y="184" text-anchor="middle" font-size="7" fill="#545454">78</text>
<text x="265" y="254" text-anchor="middle" font-size="7" fill="#545454">64</text>
<text x="182" y="298" text-anchor="middle" font-size="7" fill="#545454">55</text>
<text x="100" y="254" text-anchor="middle" font-size="7" fill="#545454">47</text>
<text x="68" y="184" text-anchor="middle" font-size="7" fill="#545454">38</text>
<text x="100" y="112" text-anchor="middle" font-size="7" fill="#545454">30</text>

<!-- Callout box for radial -->
<!-- <rect x="35" y="270" width="140" height="34" fill="#F5EFE8" stroke="#D4D4D4" rx="0"/> -->
<text x="80" y="283" text-anchor="middle" font-size="8" fill="#C8102E" font-weight="bold">Area distortion:</text>
<text x="80" y="296" text-anchor="middle" font-size="8" fill="#545454">Outer bars appear larger</text>

<!-- RIGHT PANEL: Linear horizontal bars -->
<rect x="368" y="40" width="300" height="270" fill="#F5EFE8" stroke="#D4D4D4" rx="0"/>
<text x="518" y="58" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">LINEAR BARS</text>

<!-- Horizontal bars sorted descending, max width 190px -->
<!-- 8 bars, height=24, gap=6, starting y=70 -->
<text x="428" y="86" font-size="10" fill="#2a1a0e" text-anchor="end">A</text>
<rect x="432" y="74" width="175" height="20" fill="#6B3520" rx="0"/>
<text x="612" y="88" font-size="9" fill="#2a1a0e">92</text>

<text x="428" y="112" font-size="10" fill="#2a1a0e" text-anchor="end">B</text>
<rect x="432" y="100" width="161.4" height="20" fill="#6B3520" rx="0"/>
<text x="598" y="114" font-size="9" fill="#2a1a0e">85</text>

<text x="428" y="138" font-size="10" fill="#2a1a0e" text-anchor="end">C</text>
<rect x="432" y="126" width="148.2" height="20" fill="#6B3520" rx="0"/>
<text x="585" y="140" font-size="9" fill="#2a1a0e">78</text>

<text x="428" y="164" font-size="10" fill="#2a1a0e" text-anchor="end">D</text>
<rect x="432" y="152" width="121.6" height="20" fill="#6B3520" rx="0"/>
<text x="558" y="166" font-size="9" fill="#2a1a0e">64</text>

<text x="428" y="190" font-size="10" fill="#2a1a0e" text-anchor="end">E</text>
<rect x="432" y="178" width="104.5" height="20" fill="#6B3520" rx="0"/>
<text x="541" y="192" font-size="9" fill="#2a1a0e">55</text>

<text x="428" y="216" font-size="10" fill="#2a1a0e" text-anchor="end">F</text>
<rect x="432" y="204" width="89.3" height="20" fill="#6B3520" rx="0"/>
<text x="526" y="218" font-size="9" fill="#2a1a0e">47</text>

<text x="428" y="242" font-size="10" fill="#2a1a0e" text-anchor="end">G</text>
<rect x="432" y="230" width="72.2" height="20" fill="#6B3520" rx="0"/>
<text x="509" y="244" font-size="9" fill="#2a1a0e">38</text>

<text x="428" y="268" font-size="10" fill="#2a1a0e" text-anchor="end">H</text>
<rect x="432" y="256" width="57" height="20" fill="#6B3520" rx="0"/>
<text x="494" y="270" font-size="9" fill="#2a1a0e">30</text>

<!-- Baseline -->
<line x1="432" y1="70" x2="432" y2="280" stroke="#2a1a0e" stroke-width="1"/>

<!-- Caption -->
<text x="350" y="340" text-anchor="middle" font-size="10" fill="#545454" font-style="italic">Fig. 7-6. Radial layouts introduce area distortion; linear bars allow honest comparison.</text>
</svg>