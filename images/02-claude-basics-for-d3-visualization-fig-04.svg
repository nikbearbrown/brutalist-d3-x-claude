<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
  </marker>
</defs>

<!-- Background -->
<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

<!-- Title -->
<text x="300" y="38" font-family="'EB Garamond', Georgia, serif" font-size="14" font-weight="bold" fill="#2a1a0e" text-anchor="middle">Three-Layer Verification Stack</text>

<!-- Layer 1: FORMAT CHECK (lightest) -->
<rect x="32" y="62" width="530" height="84" rx="0" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="1"/>
<text x="52" y="84" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="bold" fill="#2a1a0e" letter-spacing="0.08em">FORMAT CHECK</text>
<text x="52" y="104" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#2a1a0e">File type, CDN ref, CSS location</text>
<text x="52" y="122" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#545454">Catches: Wrong format, wrong D3 version</text>
<text x="540" y="108" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#545454" text-anchor="end">~10 seconds</text>

<!-- Layer 2: FACT CHECK (medium) -->
<rect x="32" y="156" width="530" height="84" rx="0" fill="#D4D4D4" stroke="#D4D4D4" stroke-width="1"/>
<text x="52" y="178" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="bold" fill="#2a1a0e" letter-spacing="0.08em">FACT CHECK</text>
<text x="52" y="198" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#2a1a0e">Data values, axis labels, color palette</text>
<text x="52" y="216" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#545454">Catches: Wrong sort, non-zero baseline, misspelled labels</text>
<text x="540" y="202" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#2a1a0e" text-anchor="end">~30 seconds</text>

<!-- Layer 3: RUNTIME TEST (darkest, white text) -->
<rect x="32" y="250" width="530" height="84" rx="0" fill="#1A3A5C" stroke="#2a1a0e" stroke-width="1"/>
<text x="52" y="272" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="bold" fill="#FFFFFF" letter-spacing="0.08em">RUNTIME TEST</text>
<text x="52" y="292" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#FFFFFF">Browser render, resize, dark mode, color-blind sim</text>
<text x="52" y="310" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#F5EFE8">Catches: Overflow, broken tooltips, contrast violations</text>
<text x="540" y="296" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#FFFFFF" text-anchor="end">~60 seconds</text>

<!-- Right-side downward arrow -->
<line x1="618" y1="72" x2="618" y2="322" stroke="#2a1a0e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<!-- Vertical label along the arrow -->
<text x="632" y="130" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em" writing-mode="tb">CATCHES EARLIER FAILURES FIRST</text>

<!-- Caption -->
<text x="350" y="375" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#2a1a0e" text-anchor="middle" font-style="italic">Two minutes. In order. Every time.</text>

<!-- Bottom hairline -->
<line x1="32" y1="395" x2="668" y2="395" stroke="#D4D4D4" stroke-dasharray="4 3" stroke-width="0.75"/>
</svg>