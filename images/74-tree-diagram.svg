<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="'EB Garamond', Georgia, 'Times New Roman', serif">

<!-- Background -->
<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

<!-- Title -->
<text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2a1a0e">AI Capability Taxonomy</text>

<!-- Subtitle -->
<text x="350" y="46" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#545454" letter-spacing="0.08em">TREE DIAGRAM — 3 LEVELS, 4 DOMAINS</text>

<!-- Chart area -->
<rect x="32" y="60" width="636" height="310" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="0.75"/>

<!-- Tree shifted down 35px from original. Root=130, L1=210, L2=300 -->

<!-- Root node: AI Capabilities -->
<circle cx="350" cy="130" r="6" fill="#2a1a0e"/>
<text x="350" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="#2a1a0e">AI Capabilities</text>

<!-- Connecting lines from root to level 1 -->
<line x1="350" y1="136" x2="130" y2="204" stroke="#D4D4D4" stroke-width="1.5"/>
<line x1="350" y1="136" x2="280" y2="204" stroke="#D4D4D4" stroke-width="1.5"/>
<line x1="350" y1="136" x2="430" y2="204" stroke="#D4D4D4" stroke-width="1.5"/>
<line x1="350" y1="136" x2="580" y2="204" stroke="#D4D4D4" stroke-width="1.5"/>

<!-- Level 1: Domain nodes — labels ABOVE dots to avoid overlap with child lines -->

<!-- Perception -->
<text x="130" y="198" text-anchor="middle" font-size="11" fill="#C8102E">Perception</text>
<circle cx="130" cy="210" r="5" fill="#C8102E"/>

<!-- Reasoning -->
<text x="280" y="198" text-anchor="middle" font-size="11" fill="#1A3A5C">Reasoning</text>
<circle cx="280" cy="210" r="5" fill="#1A3A5C"/>

<!-- Generation -->
<text x="430" y="198" text-anchor="middle" font-size="11" fill="#6B3520">Generation</text>
<circle cx="430" cy="210" r="5" fill="#6B3520"/>

<!-- Interaction -->
<text x="580" y="198" text-anchor="middle" font-size="11" fill="#C8860E">Interaction</text>
<circle cx="580" cy="210" r="5" fill="#C8860E"/>

<!-- Level 2 connecting lines — Perception -->
<line x1="130" y1="215" x2="72" y2="290" stroke="#D4D4D4" stroke-width="1"/>
<line x1="130" y1="215" x2="130" y2="290" stroke="#D4D4D4" stroke-width="1"/>
<line x1="130" y1="215" x2="188" y2="290" stroke="#D4D4D4" stroke-width="1"/>

<!-- Level 2 connecting lines — Reasoning -->
<line x1="280" y1="215" x2="240" y2="290" stroke="#D4D4D4" stroke-width="1"/>
<line x1="280" y1="215" x2="320" y2="290" stroke="#D4D4D4" stroke-width="1"/>

<!-- Level 2 connecting lines — Generation -->
<line x1="430" y1="215" x2="390" y2="290" stroke="#D4D4D4" stroke-width="1"/>
<line x1="430" y1="215" x2="430" y2="290" stroke="#D4D4D4" stroke-width="1"/>
<line x1="430" y1="215" x2="470" y2="290" stroke="#D4D4D4" stroke-width="1"/>

<!-- Level 2 connecting lines — Interaction -->
<line x1="580" y1="215" x2="540" y2="290" stroke="#D4D4D4" stroke-width="1"/>
<line x1="580" y1="215" x2="580" y2="290" stroke="#D4D4D4" stroke-width="1"/>
<line x1="580" y1="215" x2="620" y2="290" stroke="#D4D4D4" stroke-width="1"/>

<!-- Leaf nodes — Perception -->
<circle cx="72" cy="295" r="3.5" fill="#C8102E" opacity="0.6"/>
<text x="72" y="314" text-anchor="middle" font-size="9" fill="#545454">Vision</text>

<circle cx="130" cy="295" r="3.5" fill="#C8102E" opacity="0.6"/>
<text x="130" y="314" text-anchor="middle" font-size="9" fill="#545454">Audio</text>

<circle cx="188" cy="295" r="3.5" fill="#C8102E" opacity="0.6"/>
<text x="188" y="314" text-anchor="middle" font-size="9" fill="#545454">Sensor Fusion</text>

<!-- Leaf nodes — Reasoning -->
<circle cx="240" cy="295" r="3.5" fill="#1A3A5C" opacity="0.6"/>
<text x="240" y="314" text-anchor="middle" font-size="9" fill="#545454">Logic</text>

<circle cx="320" cy="295" r="3.5" fill="#1A3A5C" opacity="0.6"/>
<text x="320" y="314" text-anchor="middle" font-size="9" fill="#545454">Planning</text>

<!-- Leaf nodes — Generation -->
<circle cx="390" cy="295" r="3.5" fill="#6B3520" opacity="0.6"/>
<text x="390" y="314" text-anchor="middle" font-size="9" fill="#545454">Text</text>

<circle cx="430" cy="295" r="3.5" fill="#6B3520" opacity="0.6"/>
<text x="430" y="314" text-anchor="middle" font-size="9" fill="#545454">Image</text>

<circle cx="470" cy="295" r="3.5" fill="#6B3520" opacity="0.6"/>
<text x="470" y="314" text-anchor="middle" font-size="9" fill="#545454">Code</text>

<!-- Leaf nodes — Interaction -->
<circle cx="540" cy="295" r="3.5" fill="#C8860E" opacity="0.6"/>
<text x="540" y="314" text-anchor="middle" font-size="9" fill="#545454">Dialogue</text>

<circle cx="580" cy="295" r="3.5" fill="#C8860E" opacity="0.6"/>
<text x="580" y="314" text-anchor="middle" font-size="9" fill="#545454">Agents</text>

<circle cx="620" cy="295" r="3.5" fill="#C8860E" opacity="0.6"/>
<text x="620" y="314" text-anchor="middle" font-size="9" fill="#545454">Tools</text>

<!-- Caption -->
<text x="350" y="400" text-anchor="middle" font-size="11" font-style="italic" fill="#545454">46 capabilities across 4 domains — each branch decomposes into specific sub-capabilities.</text>

</svg>
