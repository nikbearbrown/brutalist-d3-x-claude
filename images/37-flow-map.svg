<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap');
    </style>
    <!-- Arrowhead markers — scaled to match stroke widths -->
    <!-- Large: for stroke-width 6-8 -->
    <marker id="arrow-red-lg" markerWidth="14" markerHeight="12" refX="13" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L14,6 L0,12 Z" fill="#C8102E"/>
    </marker>
    <!-- Medium: for stroke-width 4 -->
    <marker id="arrow-red-md" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,4 L0,8 Z" fill="#C8102E"/>
    </marker>
    <marker id="arrow-slate-lg" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L12,5 L0,10 Z" fill="#1A3A5C"/>
    </marker>
    <marker id="arrow-mark-lg" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L12,5 L0,10 Z" fill="#6B3520"/>
    </marker>
    <marker id="arrow-mark-md" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,4 L0,8 Z" fill="#6B3520"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="18" font-weight="600" fill="#2a1a0e">Major Displacement Corridors</text>

  <!-- Chart area -->
  <rect x="32" y="42" width="636" height="330" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="0.75" rx="0"/>

  <!-- Abstract region boxes -->
  <!-- Middle East / Origin regions -->
  <rect x="280" y="100" width="80" height="36" fill="none" stroke="#2a1a0e" stroke-width="1"/>
  <text x="320" y="123" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">SYRIA</text>

  <rect x="280" y="240" width="80" height="36" fill="none" stroke="#2a1a0e" stroke-width="1"/>
  <text x="320" y="263" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">AFGHANISTAN</text>

  <rect x="80" y="190" width="80" height="36" fill="none" stroke="#2a1a0e" stroke-width="1"/>
  <text x="120" y="213" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">VENEZUELA</text>

  <!-- Destination regions -->
  <rect x="460" y="68" width="70" height="36" fill="none" stroke="#2a1a0e" stroke-width="1"/>
  <text x="495" y="91" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">TURKEY</text>

  <rect x="540" y="130" width="70" height="36" fill="none" stroke="#2a1a0e" stroke-width="1"/>
  <text x="575" y="153" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">GERMANY</text>

  <rect x="80" y="290" width="80" height="36" fill="none" stroke="#2a1a0e" stroke-width="1"/>
  <text x="120" y="313" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">COLOMBIA</text>

  <rect x="460" y="220" width="70" height="36" fill="none" stroke="#2a1a0e" stroke-width="1"/>
  <text x="495" y="243" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">PAKISTAN</text>

  <rect x="460" y="280" width="70" height="36" fill="none" stroke="#2a1a0e" stroke-width="1"/>
  <text x="495" y="303" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">IRAN</text>

  <!-- Flow arrows (curved paths with varying thickness) -->
  <!-- Syria -> Turkey (thickest, stroke 8, large arrow) -->
  <path d="M360,110 Q410,75 460,86" fill="none" stroke="#C8102E" stroke-width="8" marker-end="url(#arrow-red-lg)" opacity="0.85"/>

  <!-- Syria -> Germany (medium, stroke 4, medium arrow) -->
  <path d="M360,125 Q450,120 540,148" fill="none" stroke="#C8102E" stroke-width="4" marker-end="url(#arrow-red-md)" opacity="0.85"/>

  <!-- Venezuela -> Colombia (thick, stroke 6, large arrow) -->
  <path d="M120,226 Q100,260 120,290" fill="none" stroke="#1A3A5C" stroke-width="6" marker-end="url(#arrow-slate-lg)" opacity="0.85"/>

  <!-- Afghanistan -> Pakistan (thick, stroke 6, large arrow) -->
  <path d="M360,252 Q410,235 460,238" fill="none" stroke="#6B3520" stroke-width="6" marker-end="url(#arrow-mark-lg)" opacity="0.85"/>

  <!-- Afghanistan -> Iran (medium, stroke 4, medium arrow) -->
  <path d="M360,265 Q415,285 460,298" fill="none" stroke="#6B3520" stroke-width="4" marker-end="url(#arrow-mark-md)" opacity="0.85"/>

  <!-- Legend -->
  <line x1="52" y1="352" x2="72" y2="352" stroke="#C8102E" stroke-width="4"/>
  <text x="78" y="355" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454" letter-spacing="0.08em">SYRIA ORIGIN</text>

  <line x1="200" y1="352" x2="220" y2="352" stroke="#1A3A5C" stroke-width="4"/>
  <text x="226" y="355" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454" letter-spacing="0.08em">VENEZUELA ORIGIN</text>

  <line x1="390" y1="352" x2="410" y2="352" stroke="#6B3520" stroke-width="4"/>
  <text x="416" y="355" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454" letter-spacing="0.08em">AFGHANISTAN ORIGIN</text>

  <!-- Caption -->
  <text x="350" y="408" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-style="italic" fill="#545454">Three countries account for over half of tracked flows.</text>
</svg>
