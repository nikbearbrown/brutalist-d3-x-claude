<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="'EB Garamond', Georgia, 'Times New Roman', serif">

<!-- Background -->
<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

<!-- Title -->
<text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2a1a0e">Three Simultaneous Revolutions</text>

<!-- Subtitle -->
<text x="350" y="46" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#545454" letter-spacing="0.08em">TIMELINE — LEGAL, DIGITAL, FINANCIAL</text>

<!-- Chart area -->
<rect x="32" y="60" width="636" height="310" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="0.75"/>

<!-- Time axis: 2018 to 2025 -->
<!-- X mapping: 2018=100, 2025=640. Span=540px for 7 years. 1 year = 77.14px -->
<!-- Y: shared axis at y=320, tracks: Legal=130, Digital=200, Financial=270 -->

<!-- Track labels -->
<text x="55" y="134" text-anchor="start" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#C8102E" letter-spacing="0.08em">LEGAL</text>
<text x="55" y="204" text-anchor="start" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#1A3A5C" letter-spacing="0.08em">DIGITAL</text>
<text x="55" y="274" text-anchor="start" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#6B3520" letter-spacing="0.08em">FINANCIAL</text>

<!-- Track horizontal lines -->
<line x1="100" y1="130" x2="640" y2="130" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="100" y1="200" x2="640" y2="200" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="100" y1="270" x2="640" y2="270" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>

<!-- Shared time axis -->
<line x1="100" y1="320" x2="640" y2="320" stroke="#2a1a0e" stroke-width="1.5"/>

<!-- Year tick marks and labels -->
<line x1="100" y1="316" x2="100" y2="324" stroke="#2a1a0e" stroke-width="1"/>
<text x="100" y="338" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">2018</text>
<line x1="177" y1="316" x2="177" y2="324" stroke="#2a1a0e" stroke-width="1"/>
<text x="177" y="338" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">2019</text>
<line x1="254" y1="316" x2="254" y2="324" stroke="#2a1a0e" stroke-width="1"/>
<text x="254" y="338" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">2020</text>
<line x1="331" y1="316" x2="331" y2="324" stroke="#2a1a0e" stroke-width="1"/>
<text x="331" y="338" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">2021</text>
<line x1="409" y1="316" x2="409" y2="324" stroke="#2a1a0e" stroke-width="1"/>
<text x="409" y="338" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">2022</text>
<line x1="486" y1="316" x2="486" y2="324" stroke="#2a1a0e" stroke-width="1"/>
<text x="486" y="338" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">2023</text>
<line x1="563" y1="316" x2="563" y2="324" stroke="#2a1a0e" stroke-width="1"/>
<text x="563" y="338" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">2024</text>
<line x1="640" y1="316" x2="640" y2="324" stroke="#2a1a0e" stroke-width="1"/>
<text x="640" y="338" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">2025</text>

<!-- Events — Legal track (y=130) #C8102E -->
<!-- GDPR Enacted (2018.5) x=138 -->
<line x1="138" y1="130" x2="138" y2="320" stroke="#C8102E" stroke-width="0.75" stroke-dasharray="4,3"/>
<circle cx="138" cy="130" r="6" fill="#C8102E"/>
<text x="138" y="118" text-anchor="middle" font-size="9" fill="#C8102E">GDPR</text>

<!-- AI Act Proposed (2021.3) x=354 -->
<line x1="354" y1="130" x2="354" y2="320" stroke="#C8102E" stroke-width="0.75" stroke-dasharray="4,3"/>
<circle cx="354" cy="130" r="6" fill="#C8102E"/>
<text x="354" y="118" text-anchor="middle" font-size="9" fill="#C8102E">AI Act Proposed</text>

<!-- AI Act Final (2024.3) x=586 -->
<line x1="586" y1="130" x2="586" y2="320" stroke="#C8102E" stroke-width="0.75" stroke-dasharray="4,3"/>
<circle cx="586" cy="130" r="6" fill="#C8102E"/>
<text x="586" y="118" text-anchor="middle" font-size="9" fill="#C8102E">AI Act Final</text>

<!-- Events — Digital track (y=200) #1A3A5C -->
<!-- GPT-2 (2019.2) x=192 -->
<line x1="192" y1="200" x2="192" y2="320" stroke="#1A3A5C" stroke-width="0.75" stroke-dasharray="4,3"/>
<circle cx="192" cy="200" r="6" fill="#1A3A5C"/>
<text x="192" y="188" text-anchor="middle" font-size="9" fill="#1A3A5C">GPT-2</text>

<!-- GPT-3 (2020.5) x=293 -->
<line x1="293" y1="200" x2="293" y2="320" stroke="#1A3A5C" stroke-width="0.75" stroke-dasharray="4,3"/>
<circle cx="293" cy="200" r="6" fill="#1A3A5C"/>
<text x="293" y="188" text-anchor="middle" font-size="9" fill="#1A3A5C">GPT-3</text>

<!-- ChatGPT (2022.9) x=478 -->
<line x1="478" y1="200" x2="478" y2="320" stroke="#1A3A5C" stroke-width="0.75" stroke-dasharray="4,3"/>
<circle cx="478" cy="200" r="6" fill="#1A3A5C"/>
<text x="478" y="188" text-anchor="middle" font-size="9" fill="#1A3A5C">ChatGPT</text>

<!-- Events — Financial track (y=270) #6B3520 -->
<!-- Libra Announced (2019.5) x=216 -->
<line x1="216" y1="270" x2="216" y2="320" stroke="#6B3520" stroke-width="0.75" stroke-dasharray="4,3"/>
<circle cx="216" cy="270" r="6" fill="#6B3520"/>
<text x="216" y="258" text-anchor="middle" font-size="9" fill="#6B3520">Libra</text>

<!-- FTX Collapse (2022.8) x=470 -->
<line x1="470" y1="270" x2="470" y2="320" stroke="#6B3520" stroke-width="0.75" stroke-dasharray="4,3"/>
<circle cx="470" cy="270" r="6" fill="#6B3520"/>
<text x="500" y="258" text-anchor="start" font-size="9" fill="#6B3520">FTX Collapse</text>

<!-- Caption -->
<text x="350" y="395" text-anchor="middle" font-size="11" font-style="italic" fill="#545454">Legal, Digital, and Financial — accelerating in parallel.</text>

</svg>
