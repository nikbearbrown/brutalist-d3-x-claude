<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="18" font-weight="600" fill="#2a1a0e">The Widening Gap</text>

  <!-- Chart area -->
  <rect x="72" y="42" width="596" height="320" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- Y-axis: 0-100. Chart top=42 (100), chart bottom=362 (0). 1 unit = 3.2px -->
  <!-- X-axis: 2016-2024. Left=72 (2016), Right=668 (2024). 1 year = 74.5px -->

  <!-- Y-axis gridlines and labels -->
  <line x1="72" y1="362" x2="668" y2="362" stroke="#D4D4D4" stroke-width="0.5"/>
  <text x="66" y="366" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#545454">0</text>

  <line x1="72" y1="282" x2="668" y2="282" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="66" y="286" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#545454">25</text>

  <line x1="72" y1="202" x2="668" y2="202" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="66" y="206" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#545454">50</text>

  <line x1="72" y1="122" x2="668" y2="122" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="66" y="126" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#545454">75</text>

  <line x1="72" y1="42" x2="668" y2="42" stroke="#D4D4D4" stroke-width="0.5"/>
  <text x="66" y="46" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#545454">100</text>

  <!-- X-axis labels -->
  <text x="72" y="378" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#545454">2016</text>
  <text x="146.5" y="378" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#545454">2017</text>
  <text x="221" y="378" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#545454">2018</text>
  <text x="295.5" y="378" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#545454">2019</text>
  <text x="370" y="378" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#545454">2020</text>
  <text x="444.5" y="378" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#545454">2021</text>
  <text x="519" y="378" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#545454">2022</text>
  <text x="593.5" y="378" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#545454">2023</text>
  <text x="668" y="378" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#545454">2024</text>

  <!-- Group A data: 75, 78, 80, 83, 85, 87, 89, 91, 92 -->
  <!-- Y positions: 75=122, 78=112.4, 80=106, 83=96.4, 85=90, 87=83.6, 89=77.2, 91=70.8, 92=67.6 -->
  <!-- Group B data: 53, 50, 47, 43, 40, 37, 33, 28, 25 -->
  <!-- Y positions: 53=192.4, 50=202, 47=211.6, 43=224.4, 40=234, 37=243.6, 33=256.4, 28=272.4, 25=282 -->

  <!-- Line A (Group A) - Red -->
  <polyline points="72,122 146.5,112.4 221,106 295.5,96.4 370,90 444.5,83.6 519,77.2 593.5,70.8 668,67.6" fill="none" stroke="#C8102E" stroke-width="2"/>

  <!-- Line B (Group B) - Slate -->
  <polyline points="72,192.4 146.5,202 221,211.6 295.5,224.4 370,234 444.5,243.6 519,256.4 593.5,272.4 668,282" fill="none" stroke="#1A3A5C" stroke-width="2"/>

  <!-- Dots for Group A -->
  <circle cx="72" cy="122" r="3.5" fill="#C8102E"/>
  <circle cx="146.5" cy="112.4" r="3.5" fill="#C8102E"/>
  <circle cx="221" cy="106" r="3.5" fill="#C8102E"/>
  <circle cx="295.5" cy="96.4" r="3.5" fill="#C8102E"/>
  <circle cx="370" cy="90" r="3.5" fill="#C8102E"/>
  <circle cx="444.5" cy="83.6" r="3.5" fill="#C8102E"/>
  <circle cx="519" cy="77.2" r="3.5" fill="#C8102E"/>
  <circle cx="593.5" cy="70.8" r="3.5" fill="#C8102E"/>
  <circle cx="668" cy="67.6" r="3.5" fill="#C8102E"/>

  <!-- Dots for Group B -->
  <circle cx="72" cy="192.4" r="3.5" fill="#1A3A5C"/>
  <circle cx="146.5" cy="202" r="3.5" fill="#1A3A5C"/>
  <circle cx="221" cy="211.6" r="3.5" fill="#1A3A5C"/>
  <circle cx="295.5" cy="224.4" r="3.5" fill="#1A3A5C"/>
  <circle cx="370" cy="234" r="3.5" fill="#1A3A5C"/>
  <circle cx="444.5" cy="243.6" r="3.5" fill="#1A3A5C"/>
  <circle cx="519" cy="256.4" r="3.5" fill="#1A3A5C"/>
  <circle cx="593.5" cy="272.4" r="3.5" fill="#1A3A5C"/>
  <circle cx="668" cy="282" r="3.5" fill="#1A3A5C"/>

  <!-- Gap annotation at 2016 -->
  <line x1="72" y1="122" x2="72" y2="192.4" stroke="#545454" stroke-width="0.75" stroke-dasharray="3,2"/>
  <text x="55" y="160" text-anchor="end" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="12" font-weight="600" fill="#6B3520">22 pts</text>

  <!-- Gap annotation at 2024 -->
  <line x1="668" y1="67.6" x2="668" y2="282" stroke="#545454" stroke-width="0.75" stroke-dasharray="3,2"/>
  <text x="655" y="180" text-anchor="end" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="12" font-weight="600" fill="#6B3520">67 pts</text>

  <!-- Series labels -->
  <text x="668" y="60" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-size="8" font-weight="500" fill="#C8102E" letter-spacing="0.08em">GROUP A</text>
  <text x="668" y="296" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-size="8" font-weight="500" fill="#1A3A5C" letter-spacing="0.08em">GROUP B</text>

  <!-- Caption -->
  <text x="350" y="405" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-style="italic" fill="#545454">The gap was 22 points in 2016 — it is 67 in 2024.</text>
</svg>