<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" font-family="'EB Garamond', Georgia, 'Times New Roman', serif">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
  </marker>
</defs>

<!-- Background -->
<rect x="0" y="0" width="700" height="480" fill="#FFFFFF"/>

<!-- Root question box -->
<rect x="175" y="28" width="350" height="48" fill="#2a1a0e"/>
<text x="350" y="50" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">Does the dataset support</text>
<text x="350" y="67" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">the reader's question?</text>

<!-- Branches down from root -->
<!-- YES branch (left) -->
<line x1="270" y1="76" x2="270" y2="110" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="258" y="100" text-anchor="end" font-size="12" fill="#1A3A5C" font-weight="bold" font-family="'IBM Plex Mono', 'Courier New', monospace" letter-spacing="0.08em">YES</text>

<!-- NO branch (right) -->
<line x1="430" y1="76" x2="430" y2="110" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="442" y="100" font-size="12" fill="#C8102E" font-weight="bold" font-family="'IBM Plex Mono', 'Courier New', monospace" letter-spacing="0.08em">NO</text>

<!-- YES box -->
<rect x="175" y="114" width="190" height="38" fill="#1A3A5C"/>
<text x="270" y="138" text-anchor="middle" font-size="14" fill="#FFFFFF" font-weight="bold">YES  &#8594;  Proceed</text>

<!-- NO box -->
<rect x="385" y="114" width="140" height="38" fill="#C8102E"/>
<text x="455" y="138" text-anchor="middle" font-size="14" fill="#FFFFFF" font-weight="bold">NO</text>

<!-- Arrow from NO box down to three honest moves -->
<line x1="455" y1="152" x2="455" y2="180" stroke="#2a1a0e" stroke-width="1.5"/>
<!-- Horizontal spread line -->
<line x1="130" y1="180" x2="560" y2="180" stroke="#2a1a0e" stroke-width="1.5"/>
<!-- Three vertical drops -->
<line x1="130" y1="180" x2="130" y2="200" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="350" y1="180" x2="350" y2="200" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="560" y1="180" x2="560" y2="200" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Honest Move 1 -->
<rect x="32" y="204" width="196" height="100" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="1"/>
<rect x="32" y="204" width="196" height="28" fill="#2a1a0e"/>
<text x="130" y="223" text-anchor="middle" font-size="10" fill="#FFFFFF" font-family="'IBM Plex Mono', 'Courier New', monospace" letter-spacing="0.08em">HONEST MOVE 1</text>
<text x="130" y="258" text-anchor="middle" font-size="15" fill="#2a1a0e" font-weight="bold">Find better data</text>
<text x="130" y="278" text-anchor="middle" font-size="12" fill="#545454">Locate a dataset that</text>
<text x="130" y="293" text-anchor="middle" font-size="12" fill="#545454">directly answers the question</text>

<!-- Honest Move 2 -->
<rect x="252" y="204" width="196" height="100" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="1"/>
<rect x="252" y="204" width="196" height="28" fill="#2a1a0e"/>
<text x="350" y="223" text-anchor="middle" font-size="10" fill="#FFFFFF" font-family="'IBM Plex Mono', 'Courier New', monospace" letter-spacing="0.08em">HONEST MOVE 2</text>
<text x="350" y="258" text-anchor="middle" font-size="15" fill="#2a1a0e" font-weight="bold">Reframe the question</text>
<text x="350" y="278" text-anchor="middle" font-size="12" fill="#545454">Adjust the question to fit</text>
<text x="350" y="293" text-anchor="middle" font-size="12" fill="#545454">what the data can answer</text>

<!-- Honest Move 3 -->
<rect x="472" y="204" width="196" height="100" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="1"/>
<rect x="472" y="204" width="196" height="28" fill="#2a1a0e"/>
<text x="570" y="223" text-anchor="middle" font-size="10" fill="#FFFFFF" font-family="'IBM Plex Mono', 'Courier New', monospace" letter-spacing="0.08em">HONEST MOVE 3</text>
<text x="570" y="258" text-anchor="middle" font-size="15" fill="#2a1a0e" font-weight="bold">Acknowledge the gap</text>
<text x="570" y="278" text-anchor="middle" font-size="12" fill="#545454">Use a proxy and label it</text>
<text x="570" y="293" text-anchor="middle" font-size="12" fill="#545454">honestly as approximate</text>

<!-- Divider line -->
<line x1="100" y1="332" x2="600" y2="332" stroke="#D4D4D4" stroke-width="1" stroke-dasharray="4 3"/>

<!-- Failure mode -->
<rect x="150" y="354" width="400" height="82" fill="#C8102E" stroke="#C8102E" stroke-width="3"/>
<text x="350" y="378" text-anchor="middle" font-size="11" fill="#FFFFFF" font-family="'IBM Plex Mono', 'Courier New', monospace" letter-spacing="0.08em">THE FAILURE MODE</text>
<line x1="260" y1="386" x2="440" y2="386" stroke="#FFFFFF" stroke-width="0.5" opacity="0.5"/>
<text x="350" y="410" text-anchor="middle" font-size="15" fill="#FFFFFF" font-weight="bold">Substitute a different question</text>
<text x="350" y="428" text-anchor="middle" font-size="15" fill="#FFFFFF" font-weight="bold">without acknowledging the switch</text>

<!-- Figure number -->
<text x="350" y="468" text-anchor="middle" font-size="11" fill="#545454" font-family="'IBM Plex Mono', 'Courier New', monospace" letter-spacing="0.08em">FIGURE 5-2</text>
</svg>