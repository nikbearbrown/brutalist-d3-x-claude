<line x1="295" y1="215" x2="277" y2="215" stroke="#C8102E" stroke-width="5" stroke-linecap="butt"/>
<!-- 2021 Nov (78): angle=210 — Q4 highlighted -->
<line x1="302.4" y1="187.5" x2="285.5" y2="177.7" stroke="#C8102E" stroke-width="5" stroke-linecap="butt"/>
