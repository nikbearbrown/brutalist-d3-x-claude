<text x="175" y="219" text-anchor="end" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="7" fill="#C8102E" letter-spacing="0.08em">OCT</text>
<text x="196" y="130" text-anchor="end" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="7" fill="#C8102E" letter-spacing="0.08em">NOV</text>
<text x="258" y="72" text-anchor="end" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="7" fill="#C8102E" letter-spacing="0.08em">DEC</text>

<!-- 2021 bars (innerR=55, arm extends ~30px) -->
