<line x1="397.6" y1="187.5" x2="407.0" y2="182.1" stroke="#6B3520" stroke-width="5" stroke-linecap="butt"/>
<!-- 2021 Apr (40): angle=0, r=55 →barH=10 -->
<line x1="405" y1="215" x2="415" y2="215" stroke="#6B3520" stroke-width="5" stroke-linecap="butt"/>
<!-- 2021 May (42): angle=30 -->
<line x1="397.6" y1="242.5" x2="408.1" y2="248.6" stroke="#6B3520" stroke-width="5" stroke-linecap="butt"/>
