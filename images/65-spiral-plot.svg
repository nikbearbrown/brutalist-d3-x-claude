<line x1="465" y1="215" x2="477" y2="215" stroke="#6B3520" stroke-width="5" stroke-linecap="butt"/>
<line x1="449.6" y1="272.5" x2="461" y2="279.1" stroke="#6B3520" stroke-width="5" stroke-linecap="butt"/>
<line x1="407.5" y1="314.5" x2="414" y2="325.7" stroke="#6B3520" stroke-width="5" stroke-linecap="butt"/>
<line x1="350" y1="330" x2="350" y2="345" stroke="#6B3520" stroke-width="5" stroke-linecap="butt"/>
<line x1="292.5" y1="314.5" x2="284.4" y2="328.5" stroke="#6B3520" stroke-width="5" stroke-linecap="butt"/>
<line x1="250.4" y1="272.5" x2="237.9" y2="279.7" stroke="#6B3520" stroke-width="5" stroke-linecap="butt"/>
<!-- Q4 2023 -->
<line x1="235" y1="215" x2="211" y2="215" stroke="#C8102E" stroke-width="5" stroke-linecap="butt"/>
<line x1="250.4" y1="157.5" x2="228" y2="144.5" stroke="#C8102E" stroke-width="5" stroke-linecap="butt"/>
<line x1="292.5" y1="113" x2="280" y2="91.2" stroke="#C8102E" stroke-width="5" stroke-linecap="butt"/>

<!-- 2024 bars (innerR=145) -->
<!-- Values ~20% higher than 2023 -->
<line x1="350" y1="70" x2="350" y2="49" stroke="#6B3520" stroke-width="5" stroke-linecap="butt"/>
<line x1="422.5" y1="85.5" x2="432" y2="68" stroke="#6B3520" stroke-width="5" stroke-linecap="butt"/>
