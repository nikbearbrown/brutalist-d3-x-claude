<line x1="350" y1="160" x2="350" y2="147" stroke="#6B3520" stroke-width="5" stroke-linecap="butt"/>
<!-- 2021 Feb (48): angle=-60 -->
<line x1="373.8" y1="168.2" x2="380.5" y2="156.5" stroke="#6B3520" stroke-width="5" stroke-linecap="butt"/>
