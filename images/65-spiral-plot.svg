<line x1="265" y1="215" x2="245" y2="215" stroke="#C8102E" stroke-width="5" stroke-linecap="butt"/>
<line x1="276.4" y1="172.5" x2="258" y2="161.8" stroke="#C8102E" stroke-width="5" stroke-linecap="butt"/>
<line x1="307.5" y1="141.5" x2="297.4" y2="123.9" stroke="#C8102E" stroke-width="5" stroke-linecap="butt"/>

