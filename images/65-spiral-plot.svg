<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="'EB Garamond', Georgia, 'Times New Roman', serif">

<!-- Background -->
<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

<!-- Title -->
<text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2a1a0e">Seasonal Pattern — 4 Years</text>

<!-- Subtitle -->
<text x="350" y="46" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#545454" letter-spacing="0.08em">SPIRAL PLOT — Q4 PEAK, Q2 TROUGH</text>

<!-- Chart area -->
<rect x="32" y="60" width="636" height="310" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="0.75"/>

<!-- Center at (350, 215). Scaled to 82% to fit within chart area -->
<g transform="translate(63,38.7) scale(0.82)">
<!-- Center at (350, 215). 4 years, 12 months each = 48 bars -->
<!-- Spiral: inner radius for 2021 ~55, arm spacing ~30 -->
<!-- Each month = 30 degrees. Jan at top (-90deg) -->
<!-- Bar heights proportional to values, extending outward from spiral baseline -->
<!-- Q1: moderate, Q2: shortest, Q3: moderate-high, Q4: tallest -->

<!-- Year ring guides -->
<circle cx="350" cy="215" r="55" fill="none" stroke="#D4D4D4" stroke-width="0.3" stroke-dasharray="2,2"/>
<circle cx="350" cy="215" r="85" fill="none" stroke="#D4D4D4" stroke-width="0.3" stroke-dasharray="2,2"/>
<circle cx="350" cy="215" r="115" fill="none" stroke="#D4D4D4" stroke-width="0.3" stroke-dasharray="2,2"/>
<circle cx="350" cy="215" r="145" fill="none" stroke="#D4D4D4" stroke-width="0.3" stroke-dasharray="2,2"/>

<!-- Year labels removed from spiral center — placed as legend outside the <g> group -->

<!-- Month labels at outer edge (around r~165 from center) -->
<text x="350" y="40" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="7" fill="#2a1a0e" letter-spacing="0.08em">JAN</text>
<text x="435" y="72" text-anchor="start" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="7" fill="#2a1a0e" letter-spacing="0.08em">FEB</text>
<text x="496" y="130" text-anchor="start" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="7" fill="#2a1a0e" letter-spacing="0.08em">MAR</text>
<text x="518" y="219" text-anchor="start" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="7" fill="#2a1a0e" letter-spacing="0.08em">APR</text>
<text x="496" y="300" text-anchor="start" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="7" fill="#2a1a0e" letter-spacing="0.08em">MAY</text>
<text x="435" y="358" text-anchor="start" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="7" fill="#2a1a0e" letter-spacing="0.08em">JUN</text>
<text x="350" y="390" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="7" fill="#2a1a0e" letter-spacing="0.08em">JUL</text>
<text x="258" y="358" text-anchor="end" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="7" fill="#2a1a0e" letter-spacing="0.08em">AUG</text>
