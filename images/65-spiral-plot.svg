<line x1="205" y1="215" x2="177" y2="215" stroke="#C8102E" stroke-width="5" stroke-linecap="butt"/>
<line x1="224.4" y1="142.5" x2="198" y2="127.2" stroke="#C8102E" stroke-width="5" stroke-linecap="butt"/>
<line x1="277.5" y1="85.5" x2="263" y2="60.2" stroke="#C8102E" stroke-width="5" stroke-linecap="butt"/>

</g>

<!-- Legend -->
<rect x="560" y="75" width="10" height="10" fill="#6B3520"/>
<text x="575" y="84" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="7" fill="#2a1a0e" letter-spacing="0.08em">Q1-Q3</text>
<rect x="560" y="90" width="10" height="10" fill="#C8102E"/>
<text x="575" y="99" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="7" fill="#C8102E" letter-spacing="0.08em">Q4</text>

<!-- Year labels (arm key) -->
<text x="560" y="118" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="7" fill="#545454" letter-spacing="0.08em">ARMS:</text>
<text x="560" y="130" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="7" fill="#545454" letter-spacing="0.08em">Inner → 2021</text>
<text x="560" y="140" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="7" fill="#545454" letter-spacing="0.08em">        2022</text>
<text x="560" y="150" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="7" fill="#545454" letter-spacing="0.08em">        2023</text>
<text x="560" y="160" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="7" fill="#545454" letter-spacing="0.08em">Outer → 2024</text>

<!-- Caption -->
<text x="350" y="400" text-anchor="middle" font-size="11" font-style="italic" fill="#545454">Inner arm = 2021, outer = 2024. Q4 bars grow taller each year; Q2 remains the seasonal trough.</text>

</svg>