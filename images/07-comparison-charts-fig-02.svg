<svg viewBox="0 0 700 360" xmlns="http://www.w3.org/2000/svg" font-family="'EB Garamond', Georgia, 'Times New Roman', serif">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
  </marker>
</defs>

<!-- Background -->
<rect width="700" height="360" fill="#FFFFFF"/>

<!-- Title -->
<text x="350" y="28" text-anchor="middle" font-size="15" fill="#2a1a0e" font-weight="bold">Cleveland &amp; McGill: Visual Channel Accuracy Ranking</text>

<!-- Chart area -->
<rect x="32" y="40" width="440" height="280" fill="#F5EFE8" stroke="#D4D4D4" rx="0"/>

<!-- Horizontal bars: 7 channels, each bar height=30, gap=8, start y=56 -->
<!-- Bar max width = 390px -->

<!-- #1 Position (aligned) — highlighted -->
<text x="44" y="72" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">#1</text>
<text x="62" y="72" font-size="11" fill="#2a1a0e">Position (aligned)</text>
<rect x="180" y="58" width="280" height="24" fill="#C8102E" rx="0"/>
<text x="478" y="74" font-size="10" fill="#C8102E" font-weight="bold">Most accurate</text>

<!-- #2 Position (non-aligned) -->
<text x="44" y="110" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">#2</text>
<text x="62" y="110" font-size="11" fill="#2a1a0e">Position (non-aligned)</text>
<rect x="180" y="96" width="240" height="24" fill="#6B3520" rx="0"/>

<!-- #3 Length -->
<text x="44" y="148" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">#3</text>
<text x="62" y="148" font-size="11" fill="#2a1a0e">Length</text>
<rect x="180" y="134" width="200" height="24" fill="#6B3520" rx="0"/>

<!-- #4 Angle -->
<text x="44" y="186" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">#4</text>
<text x="62" y="186" font-size="11" fill="#2a1a0e">Angle</text>
<rect x="180" y="172" width="160" height="24" fill="#6B3520" rx="0"/>

<!-- #5 Area -->
<text x="44" y="224" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">#5</text>
<text x="62" y="224" font-size="11" fill="#2a1a0e">Area</text>
<rect x="180" y="210" width="120" height="24" fill="#6B3520" rx="0"/>

<!-- #6 Luminance -->
<text x="44" y="262" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">#6</text>
<text x="62" y="262" font-size="11" fill="#2a1a0e">Luminance</text>
<rect x="180" y="248" width="80" height="24" fill="#6B3520" rx="0"/>

<!-- #7 Hue -->
<text x="44" y="300" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">#7</text>
<text x="62" y="300" font-size="11" fill="#2a1a0e">Hue</text>
<rect x="180" y="286" width="48" height="24" fill="#6B3520" rx="0"/>

<!-- Callout box -->
<rect x="492" y="90" width="180" height="70" fill="#F5EFE8" stroke="#D4D4D4" rx="0"/>
<text x="582" y="110" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#C8102E" letter-spacing="0.08em" font-weight="bold">BAR CHART USES THIS</text>
<text x="582" y="128" text-anchor="middle" font-size="11" fill="#2a1a0e">Bars encode values as</text>
<text x="582" y="143" text-anchor="middle" font-size="11" fill="#2a1a0e">aligned position on axis</text>

<!-- Arrow from callout to bar #1 -->
<line x1="492" y1="110" x2="464" y2="74" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Caption -->
<text x="350" y="345" text-anchor="middle" font-size="10" fill="#545454" font-style="italic">Fig. 7-2. Position along a common scale is the most accurately perceived visual channel.</text>
</svg>