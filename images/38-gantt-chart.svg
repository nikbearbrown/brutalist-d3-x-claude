<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="18" font-weight="600" fill="#2a1a0e">Project Timeline</text>

  <!-- Chart area -->
  <rect x="32" y="42" width="636" height="330" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="0.75" rx="0"/>

  <!-- Inner chart: tasks on y-axis, weeks 1-12 on x-axis -->
  <!-- Y-axis labels area: x 32-140, Chart grid: x 140-640 -->
  <!-- Week scale: 140 to 640 = 500px / 12 weeks = 41.67px per week -->
  <!-- w1 starts at 140, w12 ends at 640 -->
  <!-- 6 tasks, y from 62 to 352 = 290px, row height ~48px -->
  <!-- Row centers: 86, 134, 182, 230, 278, 326 -->

  <!-- Vertical gridlines for weeks -->
  <line x1="181.7" y1="62" x2="181.7" y2="352" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="223.3" y1="62" x2="223.3" y2="352" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="265" y1="62" x2="265" y2="352" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="306.7" y1="62" x2="306.7" y2="352" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="348.3" y1="62" x2="348.3" y2="352" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="390" y1="62" x2="390" y2="352" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="431.7" y1="62" x2="431.7" y2="352" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="473.3" y1="62" x2="473.3" y2="352" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="515" y1="62" x2="515" y2="352" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="556.7" y1="62" x2="556.7" y2="352" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="598.3" y1="62" x2="598.3" y2="352" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="640" y1="62" x2="640" y2="352" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Week labels along top -->
  <!-- Each week center = 140 + (w-0.5)*41.67 -->
  <text x="160.8" y="58" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454" letter-spacing="0.08em">W1</text>
  <text x="202.5" y="58" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454" letter-spacing="0.08em">W2</text>
  <text x="244.2" y="58" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454" letter-spacing="0.08em">W3</text>
  <text x="285.8" y="58" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454" letter-spacing="0.08em">W4</text>
  <text x="327.5" y="58" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454" letter-spacing="0.08em">W5</text>
  <text x="369.2" y="58" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454" letter-spacing="0.08em">W6</text>
  <text x="410.8" y="58" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454" letter-spacing="0.08em">W7</text>
  <text x="452.5" y="58" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454" letter-spacing="0.08em">W8</text>
  <text x="494.2" y="58" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454" letter-spacing="0.08em">W9</text>
  <text x="535.8" y="58" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454" letter-spacing="0.08em">W10</text>
  <text x="577.5" y="58" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454" letter-spacing="0.08em">W11</text>
  <text x="619.2" y="58" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454" letter-spacing="0.08em">W12</text>

  <!-- Task labels -->
  <text x="136" y="90" text-anchor="end" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" fill="#2a1a0e">Planning</text>
  <text x="136" y="138" text-anchor="end" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" fill="#2a1a0e">Design</text>
  <text x="136" y="186" text-anchor="end" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" fill="#2a1a0e">Development</text>
  <text x="136" y="234" text-anchor="end" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" fill="#2a1a0e">Testing</text>
  <text x="136" y="282" text-anchor="end" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" fill="#2a1a0e">Deployment</text>
  <text x="136" y="330" text-anchor="end" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" fill="#2a1a0e">Review</text>

  <!-- Gantt bars -->
  <!-- Planning: w1-3, complete (#6B3520) => x=140, width=3*41.67=125 -->
  <rect x="140" y="74" width="125" height="24" fill="#6B3520" rx="0"/>

  <!-- Design: w2-5, complete (#6B3520) => x=181.7, width=4*41.67=166.7 -->
  <rect x="181.7" y="122" width="166.7" height="24" fill="#6B3520" rx="0"/>

  <!-- Development: w4-9, in progress (#C8102E) => x=265, width=6*41.67=250 -->
  <rect x="265" y="170" width="250" height="24" fill="#C8102E" rx="0"/>

  <!-- Testing: w8-11, pending (#D4D4D4) => x=431.7, width=4*41.67=166.7 -->
  <rect x="431.7" y="218" width="166.7" height="24" fill="#D4D4D4" rx="0"/>

  <!-- Deployment: w10-12, pending (#D4D4D4) => x=515, width=3*41.67=125 -->
  <rect x="515" y="266" width="125" height="24" fill="#D4D4D4" rx="0"/>

  <!-- Review: w11-12, pending (#D4D4D4) => x=556.7, width=2*41.67=83.3 -->
  <rect x="556.7" y="314" width="83.3" height="24" fill="#D4D4D4" rx="0"/>

  <!-- TODAY marker at week 7 => x = 140 + 6*41.67 = 390 (end of w6 / start of w7 area) -->
  <!-- Actually week 7 center = 410.8, let's put TODAY line at ~390 (between w6 and w7) -->
  <line x1="390" y1="62" x2="390" y2="352" stroke="#C8860E" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="390" y="368" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="10" font-weight="500" fill="#C8860E" letter-spacing="0.08em">TODAY</text>

  <!-- Legend -->
  <rect x="140" y="386" width="14" height="14" fill="#6B3520" rx="0"/>
  <text x="158" y="397" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454" letter-spacing="0.08em">COMPLETE</text>

  <rect x="260" y="386" width="14" height="14" fill="#C8102E" rx="0"/>
  <text x="278" y="397" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454" letter-spacing="0.08em">IN PROGRESS</text>

  <rect x="408" y="386" width="14" height="14" fill="#D4D4D4" rx="0"/>
  <text x="426" y="397" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454" letter-spacing="0.08em">PENDING</text>

  <!-- Caption -->
  <text x="610" y="408" text-anchor="end" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-style="italic" fill="#545454">Position + length encode intervals and duration.</text>
</svg>
