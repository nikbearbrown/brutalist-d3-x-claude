<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="'EB Garamond', Georgia, 'Times New Roman', serif">

<!-- Background -->
<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

<!-- Title -->
<text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2a1a0e">Global R&amp;D Spending</text>

<!-- Subtitle -->
<text x="350" y="46" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#545454" letter-spacing="0.08em">TREEMAP — SECTOR AND SUBSECTOR BREAKDOWN</text>

<!-- Chart area border -->
<rect x="32" y="60" width="636" height="310" fill="none" stroke="#D4D4D4" stroke-width="0.75"/>

<!-- Technology sector (largest): left half, 32-380, 60-370 -->
<!-- Technology > Software: 32-380, 60-200 -->
<rect x="32" y="60" width="348" height="140" fill="#C8102E" opacity="0.85"/>
<text x="206" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">Software</text>
<text x="206" y="138" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#FFFFFF" letter-spacing="0.08em">$218B</text>

<!-- Technology > Hardware: 32-206, 200-370 -->
<rect x="32" y="200" width="174" height="170" fill="#C8102E" opacity="0.65"/>
<text x="119" y="280" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">Hardware</text>
<text x="119" y="298" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#FFFFFF" letter-spacing="0.08em">$142B</text>

<!-- Technology > Semiconductors: 206-380, 200-370 -->
<rect x="206" y="200" width="174" height="170" fill="#C8102E" opacity="0.45"/>
<text x="293" y="280" text-anchor="middle" font-size="11" fill="#FFFFFF">Semiconductors</text>
<text x="293" y="298" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#FFFFFF" letter-spacing="0.08em">$98B</text>

<!-- Life Sciences sector: top-right, 380-668, 60-230 -->
<!-- Life Sciences > Pharma: 380-668, 60-160 -->
<rect x="380" y="60" width="288" height="100" fill="#1A3A5C" opacity="0.85"/>
<text x="524" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">Pharma</text>
<text x="524" y="128" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#FFFFFF" letter-spacing="0.08em">$175B</text>

<!-- Life Sciences > Biotech: 380-524, 160-230 -->
<rect x="380" y="160" width="144" height="70" fill="#1A3A5C" opacity="0.6"/>
<text x="452" y="200" text-anchor="middle" font-size="11" fill="#FFFFFF">Biotech</text>

<!-- Life Sciences > Medical Devices: 524-668, 160-230 -->
<rect x="524" y="160" width="144" height="70" fill="#1A3A5C" opacity="0.4"/>
<text x="596" y="200" text-anchor="middle" font-size="10" fill="#FFFFFF">Med Devices</text>

<!-- Finance sector: bottom-right top, 380-542, 230-370 -->
<!-- Finance > Banking: 380-542, 230-305 -->
<rect x="380" y="230" width="162" height="75" fill="#6B3520" opacity="0.8"/>
<text x="461" y="272" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">Banking</text>

<!-- Finance > Insurance: 380-542, 305-370 -->
<rect x="380" y="305" width="162" height="65" fill="#6B3520" opacity="0.5"/>
<text x="461" y="342" text-anchor="middle" font-size="10" fill="#FFFFFF">Insurance</text>

<!-- Manufacturing sector (smallest): bottom-right bottom, 542-668, 230-370 -->
<!-- Manufacturing > Automotive: 542-668, 230-310 -->
<rect x="542" y="230" width="126" height="80" fill="#C8860E" opacity="0.8"/>
<text x="605" y="275" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">Automotive</text>

<!-- Manufacturing > Aerospace: 542-668, 310-370 -->
<rect x="542" y="310" width="126" height="60" fill="#C8860E" opacity="0.5"/>
<text x="605" y="345" text-anchor="middle" font-size="10" fill="#FFFFFF">Aerospace</text>

<!-- Sector labels along top -->
<text x="206" y="390" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#C8102E" letter-spacing="0.08em">TECHNOLOGY</text>
<text x="524" y="390" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#1A3A5C" letter-spacing="0.08em">LIFE SCIENCES</text>
<text x="461" y="390" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#6B3520" letter-spacing="0.08em">FINANCE</text>

<!-- Caption -->
<text x="350" y="410" text-anchor="middle" font-size="11" font-style="italic" fill="#545454">Technology and life sciences dominate global R&amp;D investment.</text>

</svg>