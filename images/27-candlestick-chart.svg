<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <!-- Chart area -->
  <rect x="32" y="32" width="636" height="356" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Title -->
  <text x="350" y="60" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="20" fill="#2a1a0e" font-weight="bold">Price Action Across 10 Trading Sessions</text>

  <!-- Caption -->
  <text x="350" y="378" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="12" fill="#545454" font-style="italic">Body shows open-to-close. Wicks show high and low.</text>

  <!-- Y-axis label -->
  <text x="52" y="200" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454" letter-spacing="0.08em" transform="rotate(-90, 52, 200)">PRICE ($)</text>

  <!-- X-axis label -->
  <text x="380" y="355" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454" letter-spacing="0.08em">TRADING DAY</text>

  <!-- Y-axis: Price $96-$112, mapped to y: 310 (96) to 80 (112) -->
  <!-- gridlines and ticks -->
  <line x1="90" y1="310" x2="640" y2="310" stroke="#D4D4D4" stroke-width="0.5"/>
  <text x="85" y="313" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454">$96</text>

  <line x1="90" y1="281.25" x2="640" y2="281.25" stroke="#D4D4D4" stroke-width="0.5"/>
  <text x="85" y="284" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454">$98</text>

  <line x1="90" y1="252.5" x2="640" y2="252.5" stroke="#D4D4D4" stroke-width="0.5"/>
  <text x="85" y="255.5" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454">$100</text>

  <line x1="90" y1="223.75" x2="640" y2="223.75" stroke="#D4D4D4" stroke-width="0.5"/>
  <text x="85" y="226.75" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454">$102</text>

  <line x1="90" y1="195" x2="640" y2="195" stroke="#D4D4D4" stroke-width="0.5"/>
  <text x="85" y="198" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454">$104</text>

  <line x1="90" y1="166.25" x2="640" y2="166.25" stroke="#D4D4D4" stroke-width="0.5"/>
  <text x="85" y="169.25" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454">$106</text>

  <line x1="90" y1="137.5" x2="640" y2="137.5" stroke="#D4D4D4" stroke-width="0.5"/>
  <text x="85" y="140.5" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454">$108</text>

  <line x1="90" y1="108.75" x2="640" y2="108.75" stroke="#D4D4D4" stroke-width="0.5"/>
  <text x="85" y="111.75" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454">$110</text>

  <line x1="90" y1="80" x2="640" y2="80" stroke="#D4D4D4" stroke-width="0.5"/>
  <text x="85" y="83" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454">$112</text>

  <!-- Price mapping: y = 310 - (price - 96) * 14.375 -->
  <!-- Day 1: O=100 H=103 L=98 C=102 — Bullish -->
  <line x1="145" y1="267.125" x2="145" y2="281.25" stroke="#6B3520" stroke-width="1.5"/>
  <rect x="133" y="223.75" width="24" height="28.75" fill="#F5EFE8" stroke="#6B3520" stroke-width="1.5"/>
  <line x1="145" y1="195" x2="145" y2="223.75" stroke="#6B3520" stroke-width="1.5"/>
  <text x="145" y="330" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454">1</text>

  <!-- Day 2: O=102 H=104 L=99 C=99 — Bearish -->
  <line x1="200" y1="266.5" x2="200" y2="267.125" stroke="#6B3520" stroke-width="1.5"/>
  <rect x="188" y="223.75" width="24" height="43.125" fill="#6B3520" stroke="#6B3520" stroke-width="1.5"/>
  <line x1="200" y1="195" x2="200" y2="223.75" stroke="#6B3520" stroke-width="1.5"/>
  <text x="200" y="330" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454">2</text>

  <!-- Day 3: O=99 H=101 L=97 C=101 — Bullish -->
  <line x1="255" y1="281.25" x2="255" y2="295.625" stroke="#6B3520" stroke-width="1.5"/>
  <rect x="243" y="238.125" width="24" height="28.75" fill="#F5EFE8" stroke="#6B3520" stroke-width="1.5"/>
  <line x1="255" y1="223.75" x2="255" y2="238.125" stroke="#6B3520" stroke-width="1.5"/>
  <text x="255" y="330" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454">3</text>

  <!-- Day 4: O=101 H=105 L=100 C=104 — Bullish -->
  <line x1="310" y1="195" x2="310" y2="238.125" stroke="#6B3520" stroke-width="1.5"/>
  <rect x="298" y="195" width="24" height="43.125" fill="#F5EFE8" stroke="#6B3520" stroke-width="1.5"/>
  <line x1="310" y1="180.625" x2="310" y2="195" stroke="#6B3520" stroke-width="1.5"/>
  <text x="310" y="330" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454">4</text>

  <!-- Day 5: O=104 H=106 L=102 C=103 — Bearish -->
  <line x1="365" y1="209.375" x2="365" y2="223.75" stroke="#6B3520" stroke-width="1.5"/>
  <rect x="353" y="195" width="24" height="14.375" fill="#6B3520" stroke="#6B3520" stroke-width="1.5"/>
  <line x1="365" y1="166.25" x2="365" y2="195" stroke="#6B3520" stroke-width="1.5"/>
  <text x="365" y="330" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454">5</text>

  <!-- Day 6: O=103 H=107 L=102 C=106 — Bullish -->
  <line x1="420" y1="166.25" x2="420" y2="209.375" stroke="#6B3520" stroke-width="1.5"/>
  <rect x="408" y="166.25" width="24" height="43.125" fill="#F5EFE8" stroke="#6B3520" stroke-width="1.5"/>
  <line x1="420" y1="137.5" x2="420" y2="166.25" stroke="#6B3520" stroke-width="1.5"/>
  <text x="420" y="330" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454">6</text>

  <!-- Day 7: O=106 H=108 L=104 C=105 — Bearish -->
  <line x1="475" y1="180.625" x2="475" y2="195" stroke="#6B3520" stroke-width="1.5"/>
  <rect x="463" y="166.25" width="24" height="14.375" fill="#6B3520" stroke="#6B3520" stroke-width="1.5"/>
  <line x1="475" y1="137.5" x2="475" y2="166.25" stroke="#6B3520" stroke-width="1.5"/>
  <text x="475" y="330" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454">7</text>

  <!-- Day 8: O=105 H=109 L=103 C=108 — Bullish -->
  <line x1="530" y1="137.5" x2="530" y2="180.625" stroke="#6B3520" stroke-width="1.5"/>
  <rect x="518" y="137.5" width="24" height="43.125" fill="#F5EFE8" stroke="#6B3520" stroke-width="1.5"/>
  <line x1="530" y1="108.75" x2="530" y2="137.5" stroke="#6B3520" stroke-width="1.5"/>
  <text x="530" y="330" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454">8</text>

  <!-- Day 9: O=108 H=110 L=106 C=107 — Bearish -->
  <line x1="585" y1="151.875" x2="585" y2="166.25" stroke="#6B3520" stroke-width="1.5"/>
  <rect x="573" y="137.5" width="24" height="14.375" fill="#6B3520" stroke="#6B3520" stroke-width="1.5"/>
  <line x1="585" y1="108.75" x2="585" y2="137.5" stroke="#6B3520" stroke-width="1.5"/>
  <text x="585" y="330" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454">9</text>

  <!-- Day 10: O=107 H=111 L=105 C=110 — Bullish -->
  <line x1="640" y1="108.75" x2="640" y2="151.875" stroke="#6B3520" stroke-width="1.5"/>
  <rect x="628" y="108.75" width="24" height="43.125" fill="#F5EFE8" stroke="#6B3520" stroke-width="1.5"/>
  <line x1="640" y1="80" x2="640" y2="108.75" stroke="#6B3520" stroke-width="1.5"/>
  <text x="640" y="330" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#545454">10</text>

  <!-- Legend -->
  <rect x="100" y="390" width="14" height="14" fill="#F5EFE8" stroke="#6B3520" stroke-width="1.5"/>
  <text x="120" y="401" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">BULLISH (CLOSE &gt; OPEN)</text>
  <rect x="340" y="390" width="14" height="14" fill="#6B3520" stroke="#6B3520" stroke-width="1.5"/>
  <text x="360" y="401" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">BEARISH (CLOSE &lt; OPEN)</text>
</svg>