<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="'EB Garamond', Georgia, 'Times New Roman', serif">

<!-- Background -->
<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

<!-- Title -->
<text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2a1a0e">Funding Sources Over Time</text>

<!-- Subtitle -->
<text x="350" y="46" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#545454" letter-spacing="0.08em">STACKED BAR CHART</text>

<!-- Chart area -->
<rect x="32" y="60" width="636" height="310" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="0.75"/>

<!-- Y-axis labels -->
<text x="62" y="365" text-anchor="end" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#545454" letter-spacing="0.08em">$0M</text>
<text x="62" y="327" text-anchor="end" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#545454" letter-spacing="0.08em">$100M</text>
<text x="62" y="289" text-anchor="end" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#545454" letter-spacing="0.08em">$200M</text>
<text x="62" y="251" text-anchor="end" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#545454" letter-spacing="0.08em">$300M</text>
<text x="62" y="213" text-anchor="end" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#545454" letter-spacing="0.08em">$400M</text>
<text x="62" y="175" text-anchor="end" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#545454" letter-spacing="0.08em">$500M</text>
<text x="62" y="137" text-anchor="end" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#545454" letter-spacing="0.08em">$600M</text>
<text x="62" y="99" text-anchor="end" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#545454" letter-spacing="0.08em">$700M</text>
<text x="62" y="75" text-anchor="end" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#545454" letter-spacing="0.08em">$800M</text>

<!-- Horizontal gridlines -->
<line x1="68" y1="362" x2="658" y2="362" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="68" y1="324" x2="658" y2="324" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="68" y1="286" x2="658" y2="286" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="68" y1="248" x2="658" y2="248" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="68" y1="210" x2="658" y2="210" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="68" y1="172" x2="658" y2="172" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="68" y1="134" x2="658" y2="134" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="68" y1="96" x2="658" y2="96" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="68" y1="72" x2="658" y2="72" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>

<!-- Zero baseline -->
<line x1="68" y1="362" x2="658" y2="362" stroke="#2a1a0e" stroke-width="1"/>

<!-- Data: 2021: Gov=200, Found=100, Private=80 => total 380
     2022: Gov=220, Found=120, Private=120 => total 460
     2023: Gov=240, Found=140, Private=180 => total 560
     2024: Gov=260, Found=160, Private=240 => total 660
     Scale: 0-800M mapped to y=362 to y=58 (range 304px). 1M = 0.38px -->
<!-- barWidth=100, gap between bars centering: bars at x=140, 280, 420, 560 (center), offset -50 -->

<!-- 2021: Gov 200M (76px), Found 100M (38px), Private 80M (30.4px) -->
<!-- Gov: y=362-76=286 to 362 -->
<rect x="115" y="286" width="100" height="76" fill="#2a1a0e"/>
<!-- Found: y=286-38=248 to 286 -->
<rect x="115" y="248" width="100" height="38" fill="#6B3520"/>
<!-- Private: y=248-30.4=217.6 to 248 -->
<rect x="115" y="217.6" width="100" height="30.4" fill="#C8102E"/>

<!-- 2022: Gov 220M (83.6px), Found 120M (45.6px), Private 120M (45.6px) -->
<rect x="260" y="278.4" width="100" height="83.6" fill="#2a1a0e"/>
<rect x="260" y="232.8" width="100" height="45.6" fill="#6B3520"/>
<rect x="260" y="187.2" width="100" height="45.6" fill="#C8102E"/>

<!-- 2023: Gov 240M (91.2px), Found 140M (53.2px), Private 180M (68.4px) -->
<rect x="405" y="270.8" width="100" height="91.2" fill="#2a1a0e"/>
<rect x="405" y="217.6" width="100" height="53.2" fill="#6B3520"/>
<rect x="405" y="149.2" width="100" height="68.4" fill="#C8102E"/>

<!-- 2024: Gov 260M (98.8px), Found 160M (60.8px), Private 240M (91.2px) -->
<rect x="550" y="263.2" width="100" height="98.8" fill="#2a1a0e"/>
<rect x="550" y="202.4" width="100" height="60.8" fill="#6B3520"/>
<rect x="550" y="111.2" width="100" height="91.2" fill="#C8102E"/>

<!-- X-axis labels -->
<text x="165" y="380" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">2021</text>
<text x="310" y="380" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">2022</text>
<text x="455" y="380" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">2023</text>
<text x="600" y="380" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">2024</text>

<!-- Legend -->
<rect x="200" y="393" width="12" height="12" fill="#2a1a0e"/>
<text x="216" y="403" font-size="10" fill="#2a1a0e">Government</text>
<rect x="310" y="393" width="12" height="12" fill="#6B3520"/>
<text x="326" y="403" font-size="10" fill="#2a1a0e">Foundation</text>
<rect x="415" y="393" width="12" height="12" fill="#C8102E"/>
<text x="431" y="403" font-size="10" fill="#2a1a0e">Private</text>

<!-- Caption -->
<text x="350" y="416" text-anchor="middle" font-size="11" font-style="italic" fill="#545454">Private funding tripled — government still anchors the base.</text>

</svg>
