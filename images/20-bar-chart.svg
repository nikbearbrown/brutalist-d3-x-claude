<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="'EB Garamond', Georgia, 'Times New Roman', serif">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
  </marker>
</defs>

<!-- Background -->
<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

<!-- Title -->
<text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2a1a0e">AI Tool Adoption by Sector</text>

<!-- Subtitle -->
<text x="350" y="46" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#545454" letter-spacing="0.08em">ADOPTION RATE (%)</text>

<!-- Chart area: x=140..660, y=60..340 => w=520, h=280 -->
<rect x="140" y="60" width="520" height="280" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="0.75"/>

<!-- X-axis: 0% to 100%. Scale: 140 + pct*5.2 -->
<!-- Gridlines at 0, 20, 40, 60, 80, 100 -->
<line x1="140" y1="60" x2="140" y2="340" stroke="#2a1a0e" stroke-width="1"/>
<line x1="244" y1="60" x2="244" y2="340" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="4,3"/>
<line x1="348" y1="60" x2="348" y2="340" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="4,3"/>
<line x1="452" y1="60" x2="452" y2="340" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="4,3"/>
<line x1="556" y1="60" x2="556" y2="340" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="4,3"/>
<line x1="660" y1="60" x2="660" y2="340" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="4,3"/>

<!-- X-axis labels -->
<text x="140" y="358" text-anchor="middle" font-size="10" fill="#545454">0%</text>
<text x="244" y="358" text-anchor="middle" font-size="10" fill="#545454">20%</text>
<text x="348" y="358" text-anchor="middle" font-size="10" fill="#545454">40%</text>
<text x="452" y="358" text-anchor="middle" font-size="10" fill="#545454">60%</text>
<text x="556" y="358" text-anchor="middle" font-size="10" fill="#545454">80%</text>
<text x="660" y="358" text-anchor="middle" font-size="10" fill="#545454">100%</text>

<!-- 6 bars, sorted descending. Bar height ~36px, gap ~10px -->
<!-- y positions: bar1=72, bar2=118, bar3=164, bar4=210, bar5=256, bar6=302 -->
<!-- bar height=36 -->

<!-- Technology 87%: width = 87*5.2 = 452.4 -->
<rect x="140" y="72" width="452.4" height="36" fill="#6B3520" rx="0"/>
<text x="136" y="94" text-anchor="end" font-size="11" fill="#2a1a0e">Technology</text>
<text x="597" y="94" text-anchor="start" font-size="10" fill="#2a1a0e" font-weight="bold">87%</text>

<!-- Finance 72%: width = 72*5.2 = 374.4 -->
<rect x="140" y="118" width="374.4" height="36" fill="#6B3520" opacity="0.88" rx="0"/>
<text x="136" y="140" text-anchor="end" font-size="11" fill="#2a1a0e">Finance</text>
<text x="519" y="140" text-anchor="start" font-size="10" fill="#2a1a0e" font-weight="bold">72%</text>

<!-- Healthcare 58%: width = 58*5.2 = 301.6 -->
<rect x="140" y="164" width="301.6" height="36" fill="#6B3520" opacity="0.76" rx="0"/>
<text x="136" y="186" text-anchor="end" font-size="11" fill="#2a1a0e">Healthcare</text>
<text x="446" y="186" text-anchor="start" font-size="10" fill="#2a1a0e" font-weight="bold">58%</text>

<!-- Education 45%: width = 45*5.2 = 234 -->
<rect x="140" y="210" width="234" height="36" fill="#6B3520" opacity="0.64" rx="0"/>
<text x="136" y="232" text-anchor="end" font-size="11" fill="#2a1a0e">Education</text>
<text x="379" y="232" text-anchor="start" font-size="10" fill="#2a1a0e" font-weight="bold">45%</text>

<!-- Manufacturing 39%: width = 39*5.2 = 202.8 -->
<rect x="140" y="256" width="202.8" height="36" fill="#6B3520" opacity="0.52" rx="0"/>
<text x="136" y="278" text-anchor="end" font-size="11" fill="#2a1a0e">Manufacturing</text>
<text x="348" y="278" text-anchor="start" font-size="10" fill="#2a1a0e" font-weight="bold">39%</text>

<!-- Agriculture 21%: width = 21*5.2 = 109.2 -->
<rect x="140" y="302" width="109.2" height="36" fill="#6B3520" opacity="0.40" rx="0"/>
<text x="136" y="324" text-anchor="end" font-size="11" fill="#2a1a0e">Agriculture</text>
<text x="254" y="324" text-anchor="start" font-size="10" fill="#2a1a0e" font-weight="bold">21%</text>

<!-- Caption -->
<text x="350" y="395" text-anchor="middle" font-size="11" fill="#545454" font-style="italic">Sorted descending. Zero baseline. Position encodes magnitude.</text>
</svg>