<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="'EB Garamond', Georgia, 'Times New Roman', serif">

<!-- Background -->
<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

<!-- Title -->
<text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2a1a0e">Monthly Aid Deliveries (thousand MT)</text>

<!-- Subtitle -->
<text x="350" y="46" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#545454" letter-spacing="0.08em">RADIAL BAR CHART</text>

<!-- Chart area -->
<rect x="32" y="60" width="636" height="310" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="0.75" rx="0"/>

<!-- Center: (350, 220). Inner radius: 40. Max outer radius: 145 -->
<!-- 12 months, each 30 degrees. Bar angle width: 22 deg, gap: 8 deg -->
<!-- Values: Jan 310, Feb 245, Mar 260, Apr 275, May 290, Jun 188, Jul 215, Aug 235, Sep 268, Oct 295, Nov 340, Dec 305 -->
<!-- Scale: outerR = innerR + (value/340) * (maxOuterR - innerR) = 40 + (value/340)*105 -->

<!-- Concentric grid rings -->
<circle cx="350" cy="220" r="40" fill="none" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
<circle cx="350" cy="220" r="75" fill="none" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
<circle cx="350" cy="220" r="110" fill="none" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
<circle cx="350" cy="220" r="145" fill="none" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>

<!-- Bars as arc paths. Each month starts at angle = (month_index * 30 - 90 - 11) degrees -->
<!-- Using path arcs for each bar segment -->

<!-- Jan (310): angle -101 to -79, outerR = 40 + (310/340)*105 = 135.7 -->
<path d="M 348.7,84.4 A 135.7,135.7 0 0,1 370.7,85.3 L 356.9,180.4 A 40,40 0 0,0 353.2,180 Z" fill="#6B3520"/>

<!-- Feb (245): angle -71 to -49, outerR = 40 + (245/340)*105 = 115.6 -->
<path d="M 383.3,107.3 A 115.6,115.6 0 0,1 400.5,117.5 L 370.5,184.7 A 40,40 0 0,0 363.2,181.1 Z" fill="#6B3520"/>

<!-- Mar (260): angle -41 to -19, outerR = 40 + (260/340)*105 = 120.2 -->
<path d="M 410.7,133.3 A 120.2,120.2 0 0,1 420.6,150.5 L 376.2,192.9 A 40,40 0 0,0 372.4,188.3 Z" fill="#6B3520"/>

<!-- Apr (275): angle -11 to 11, outerR = 40 + (275/340)*105 = 124.9 -->
<path d="M 423.2,177.1 A 124.9,124.9 0 0,1 424.1,199.1 L 377.0,206.9 A 40,40 0 0,0 376.7,199.2 Z" fill="#6B3520"/>

<!-- May (290): angle 19 to 41, outerR = 40 + (290/340)*105 = 129.6 -->
<path d="M 419.9,231.7 A 129.6,129.6 0 0,1 411.8,252.8 L 373.7,215.5 A 40,40 0 0,0 376.5,209.1 Z" fill="#6B3520"/>

<!-- Jun (188): angle 49 to 71, outerR = 40 + (188/340)*105 = 98.1 -->
<path d="M 393.5,282.8 A 98.1,98.1 0 0,1 379.7,294.1 L 363.1,224.1 A 40,40 0 0,0 368.4,220.1 Z" fill="#6B3520"/>

<!-- Jul (215): angle 79 to 101, outerR = 40 + (215/340)*105 = 106.4 -->
<path d="M 356.8,326.3 A 106.4,106.4 0 0,1 340.2,326.8 L 343.2,225.9 A 40,40 0 0,0 349.0,226.3 Z" fill="#6B3520"/>

<!-- Aug (235): angle 109 to 131, outerR = 40 + (235/340)*105 = 112.6 -->
<path d="M 314.7,327.3 A 112.6,112.6 0 0,1 299.1,318.8 L 329.1,223.2 A 40,40 0 0,0 335.0,225.4 Z" fill="#6B3520"/>

<!-- Sep (268): angle 139 to 161, outerR = 40 + (268/340)*105 = 122.7 -->
<path d="M 275.2,302.0 A 122.7,122.7 0 0,1 265.7,286.3 L 318.6,215.2 A 40,40 0 0,0 322.7,220.3 Z" fill="#6B3520"/>

<!-- Oct (295): angle 169 to 191, outerR = 40 + (295/340)*105 = 131.2 -->
<path d="M 256.2,259.1 A 131.2,131.2 0 0,1 253.5,237.0 L 313.7,209.3 A 40,40 0 0,0 314.5,216.7 Z" fill="#6B3520"/>

<!-- Nov (340 — highest, highlighted): angle 199 to 221, outerR = 40 + (340/340)*105 = 145 -->
<path d="M 261.3,197.7 A 145,145 0 0,1 270.7,177.3 L 316.1,200.3 A 40,40 0 0,0 313.3,207.1 Z" fill="#C8102E"/>

<!-- Dec (305): angle 229 to 251, outerR = 40 + (305/340)*105 = 134.2 -->
<path d="M 293.1,148.5 A 134.2,134.2 0 0,1 309.1,136.7 L 327.3,191.8 A 40,40 0 0,0 321.2,196.1 Z" fill="#6B3520"/>

<!-- Simplified approach: use wedge-like bars drawn with lines for clarity -->
<!-- Overwrite complex arcs with simpler visual representation -->

<!-- Month labels around perimeter at radius 158 from center -->
<text x="350" y="70" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#2a1a0e" letter-spacing="0.08em">JAN</text>
<text x="429" y="80" text-anchor="start" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#2a1a0e" letter-spacing="0.08em">FEB</text>
<text x="480" y="130" text-anchor="start" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#2a1a0e" letter-spacing="0.08em">MAR</text>
<text x="498" y="200" text-anchor="start" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#2a1a0e" letter-spacing="0.08em">APR</text>
<text x="480" y="275" text-anchor="start" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#2a1a0e" letter-spacing="0.08em">MAY</text>
<text x="429" y="340" text-anchor="start" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#545454" letter-spacing="0.08em">JUN 188</text>
<text x="350" y="368" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#2a1a0e" letter-spacing="0.08em">JUL</text>
<text x="256" y="340" text-anchor="end" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#2a1a0e" letter-spacing="0.08em">AUG</text>
<text x="210" y="275" text-anchor="end" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#2a1a0e" letter-spacing="0.08em">SEP</text>
<text x="192" y="200" text-anchor="end" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#2a1a0e" letter-spacing="0.08em">OCT</text>
<text x="210" y="130" text-anchor="end" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#C8102E" letter-spacing="0.08em">NOV 340</text>
<text x="256" y="80" text-anchor="end" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8" fill="#2a1a0e" letter-spacing="0.08em">DEC</text>

<!-- Caption -->
<text x="350" y="400" text-anchor="middle" font-size="11" font-style="italic" fill="#545454">Peak in November. June trough at 188K MT.</text>

</svg>
