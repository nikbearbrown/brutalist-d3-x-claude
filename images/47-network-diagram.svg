<circle cx="560" cy="300" r="8" fill="#6B3520" stroke="#2a1a0e" stroke-width="0.75"/>
<text x="560" y="320" text-anchor="middle" font-size="9" fill="#2a1a0e">Resource Allocation</text>

<circle cx="100" cy="210" r="8" fill="#6B3520" stroke="#2a1a0e" stroke-width="0.75"/>
<text x="72" y="213" text-anchor="middle" font-size="9" fill="#2a1a0e">Chatbots</text>

<circle cx="600" cy="210" r="8" fill="#6B3520" stroke="#2a1a0e" stroke-width="0.75"/>
<text x="645" y="213" text-anchor="middle" font-size="9" fill="#2a1a0e">Damage Asmt.</text>

<!-- Caption -->
<text x="350" y="400" text-anchor="middle" font-size="10" fill="#545454" font-style="italic">Data Integration and Crisis Mapping are the central hubs.</text>

</svg>