<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="'EB Garamond', Georgia, 'Times New Roman', serif">

<!-- Background -->
<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

<!-- Title -->
<text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2a1a0e">AI Humanitarian Ecosystem</text>

<!-- Subtitle label -->
<text x="350" y="46" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#545454" letter-spacing="0.08em">NODE-LINK NETWORK DIAGRAM</text>

<!-- Chart area -->
<rect x="32" y="56" width="636" height="320" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="0.75"/>

<!-- Node positions:
  Data Integration (hub): 250, 210
  Crisis Mapping (hub): 470, 210
  NLP: 120, 130
  Computer Vision: 160, 290
  Logistics AI: 300, 100
  Predictive Models: 340, 310
  Satellite Analysis: 540, 120
  Resource Allocation: 560, 300
  Chatbots: 100, 210
  Damage Assessment: 600, 210
-->

<!-- Edges (drawn first, behind nodes) -->
<!-- Data Integration connections -->
<line x1="250" y1="210" x2="120" y2="130" stroke="#D4D4D4" stroke-width="1.5"/>
<line x1="250" y1="210" x2="160" y2="290" stroke="#D4D4D4" stroke-width="1.5"/>
<line x1="250" y1="210" x2="300" y2="100" stroke="#D4D4D4" stroke-width="1.5"/>
<line x1="250" y1="210" x2="340" y2="310" stroke="#D4D4D4" stroke-width="1.5"/>
<line x1="250" y1="210" x2="100" y2="210" stroke="#D4D4D4" stroke-width="1.5"/>
<line x1="250" y1="210" x2="470" y2="210" stroke="#D4D4D4" stroke-width="1.5"/>

<!-- Crisis Mapping connections -->
<line x1="470" y1="210" x2="540" y2="120" stroke="#D4D4D4" stroke-width="1.5"/>
<line x1="470" y1="210" x2="560" y2="300" stroke="#D4D4D4" stroke-width="1.5"/>
<line x1="470" y1="210" x2="600" y2="210" stroke="#D4D4D4" stroke-width="1.5"/>
<line x1="470" y1="210" x2="340" y2="310" stroke="#D4D4D4" stroke-width="1.5"/>
<line x1="470" y1="210" x2="300" y2="100" stroke="#D4D4D4" stroke-width="1.5"/>

<!-- Cross-connections -->
<line x1="120" y1="130" x2="100" y2="210" stroke="#D4D4D4" stroke-width="1"/>
<line x1="540" y1="120" x2="600" y2="210" stroke="#D4D4D4" stroke-width="1"/>
<line x1="160" y1="290" x2="340" y2="310" stroke="#D4D4D4" stroke-width="1"/>

<!-- Hub nodes -->
<circle cx="250" cy="210" r="14" fill="#C8102E" stroke="#2a1a0e" stroke-width="1"/>
<text x="250" y="236" text-anchor="middle" font-size="10" font-weight="bold" fill="#2a1a0e">Data Integration</text>

<circle cx="470" cy="210" r="14" fill="#C8102E" stroke="#2a1a0e" stroke-width="1"/>
<text x="470" y="236" text-anchor="middle" font-size="10" font-weight="bold" fill="#2a1a0e">Crisis Mapping</text>

<!-- Peripheral nodes -->
<circle cx="120" cy="130" r="8" fill="#6B3520" stroke="#2a1a0e" stroke-width="0.75"/>
<text x="120" y="118" text-anchor="middle" font-size="9" fill="#2a1a0e">NLP</text>

<circle cx="160" cy="290" r="8" fill="#6B3520" stroke="#2a1a0e" stroke-width="0.75"/>
<text x="160" y="310" text-anchor="middle" font-size="9" fill="#2a1a0e">Computer Vision</text>

<circle cx="300" cy="100" r="8" fill="#6B3520" stroke="#2a1a0e" stroke-width="0.75"/>
<text x="300" y="88" text-anchor="middle" font-size="9" fill="#2a1a0e">Logistics AI</text>

<circle cx="340" cy="310" r="8" fill="#6B3520" stroke="#2a1a0e" stroke-width="0.75"/>
<text x="340" y="330" text-anchor="middle" font-size="9" fill="#2a1a0e">Predictive Models</text>

<circle cx="540" cy="120" r="8" fill="#6B3520" stroke="#2a1a0e" stroke-width="0.75"/>
