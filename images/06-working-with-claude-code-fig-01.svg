<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="'EB Garamond', Georgia, 'Times New Roman', serif">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
  </marker>
</defs>

<!-- Background -->
<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

<!-- LEFT CHART: Vague Prompt -->
<text x="185" y="42" text-anchor="middle" font-size="11" fill="#545454" font-family="'IBM Plex Mono', 'Courier New', monospace" letter-spacing="0.08em">VAGUE PROMPT</text>

<!-- Badge: 9 WORDS -->
<rect x="137" y="48" width="96" height="22" fill="#D4D4D4"/>
<text x="185" y="64" text-anchor="middle" font-size="10" fill="#2a1a0e" font-family="'IBM Plex Mono', 'Courier New', monospace" letter-spacing="0.08em">9 WORDS</text>

<!-- Chart area left -->
<rect x="32" y="80" width="306" height="286" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="1"/>

<!-- Truncated Y-axis (starting at $40M) -->
<text x="65" y="105" text-anchor="end" font-size="10" fill="#545454">$100M</text>
<text x="60" y="158" text-anchor="end" font-size="10" fill="#545454">$80M</text>
<text x="60" y="212" text-anchor="end" font-size="10" fill="#545454">$60M</text>
<text x="60" y="266" text-anchor="end" font-size="10" fill="#545454">$40M</text>

<!-- Truncation zigzag at bottom -->
<polyline points="64,276 70,280 64,284 70,288 64,292" fill="none" stroke="#545454" stroke-width="1"/>

<!-- Grid lines -->
<line x1="68" y1="100" x2="326" y2="100" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="68" y1="154" x2="326" y2="154" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="68" y1="208" x2="326" y2="208" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="68" y1="262" x2="326" y2="262" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="4 3"/>

<!-- 5 uniform vertical bars (no labels, truncated, all same gray) -->
<rect x="86" y="125" width="36" height="230" fill="#D4D4D4"/>
<rect x="136" y="152" width="36" height="203" fill="#D4D4D4"/>
<rect x="186" y="170" width="36" height="185" fill="#D4D4D4"/>
<rect x="236" y="195" width="36" height="160" fill="#D4D4D4"/>
<rect x="286" y="218" width="36" height="137" fill="#D4D4D4"/>

<!-- No labels — that's the point -->
<text x="185" y="382" text-anchor="middle" font-size="12" fill="#545454" font-style="italic">No labels, truncated axis, uniform color</text>

<!-- RIGHT CHART: Four-Move Prompt -->
<text x="525" y="42" text-anchor="middle" font-size="11" fill="#545454" font-family="'IBM Plex Mono', 'Courier New', monospace" letter-spacing="0.08em">FOUR-MOVE PROMPT</text>

<!-- Badge: 200 WORDS -->
<rect x="477" y="48" width="96" height="22" fill="#C8102E"/>
<text x="525" y="64" text-anchor="middle" font-size="10" fill="#FFFFFF" font-family="'IBM Plex Mono', 'Courier New', monospace" letter-spacing="0.08em">200 WORDS</text>

<!-- Chart area right -->
<rect x="362" y="80" width="306" height="286" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="1"/>

<!-- Zero baseline -->
<line x1="452" y1="100" x2="452" y2="340" stroke="#2a1a0e" stroke-width="1"/>
<text x="450" y="352" text-anchor="middle" font-size="9" fill="#545454" font-family="'IBM Plex Mono', 'Courier New', monospace" letter-spacing="0.08em">$0</text>

<!-- Horizontal bars sorted descending with labels and values -->
<!-- Food $98M -->
<text x="448" y="126" text-anchor="end" font-size="12" fill="#2a1a0e">Food</text>
<rect x="452" y="112" width="170" height="22" fill="#6B3520"/>
<text x="626" y="128" font-size="11" fill="#6B3520" font-weight="bold">$98M</text>

<!-- Water $72M -->
<text x="448" y="168" text-anchor="end" font-size="12" fill="#2a1a0e">Water</text>
<rect x="452" y="154" width="125" height="22" fill="#7D4530"/>
<text x="581" y="170" font-size="11" fill="#7D4530" font-weight="bold">$72M</text>

<!-- Shelter $56M -->
<text x="448" y="210" text-anchor="end" font-size="12" fill="#2a1a0e">Shelter</text>
<rect x="452" y="196" width="97" height="22" fill="#8F5540"/>
<text x="553" y="212" font-size="11" fill="#8F5540" font-weight="bold">$56M</text>

<!-- Health $43M -->
<text x="448" y="252" text-anchor="end" font-size="12" fill="#2a1a0e">Health</text>
<rect x="452" y="238" width="75" height="22" fill="#A16550"/>
<text x="531" y="254" font-size="11" fill="#A16550" font-weight="bold">$43M</text>

<!-- Protection $31M -->
<text x="448" y="294" text-anchor="end" font-size="12" fill="#2a1a0e">Protection</text>
<rect x="452" y="280" width="54" height="22" fill="#B37560"/>
<text x="510" y="296" font-size="11" fill="#B37560" font-weight="bold">$31M</text>

<!-- Axis labels -->
<text x="525" y="382" text-anchor="middle" font-size="12" fill="#545454" font-style="italic">Sorted, labeled, zero-baselined</text>

<!-- Figure number -->
<text x="350" y="412" text-anchor="middle" font-size="11" fill="#545454" font-family="'IBM Plex Mono', 'Courier New', monospace" letter-spacing="0.08em">FIGURE 6-1</text>
</svg>