<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>
  </marker>
  <marker id="arrowL" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
    <polygon points="8 0, 0 3, 8 6" fill="#1a1714"/>
  </marker>
</defs>
<rect x="0" y="0" width="700" height="480" fill="#fdfcfb"/>
<text x="180" y="42" font-size="13" font-weight="bold" fill="#1a1714" text-anchor="middle">Left — radius encoding (the trap)</text>
<text x="520" y="42" font-size="13" font-weight="bold" fill="#1a1714" text-anchor="middle">Right — area encoding (the fix)</text>
<circle cx="120" cy="200" r="30" fill="#1a1714"/>
<circle cx="260" cy="200" r="60" fill="#1a1714"/>
<text x="120" y="248" font-size="10" fill="#4a4540" text-anchor="middle">value = 1</text>
<text x="260" y="278" font-size="10" fill="#4a4540" text-anchor="middle">value = 2</text>
<rect x="60" y="320" width="250" height="110" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="72" y="342" font-size="11" fill="#1a1714"><tspan font-weight="bold">Data ratio</tspan>     2× (1 → 2)</text>
<text x="72" y="364" font-size="11" fill="#1a1714"><tspan font-weight="bold">Area ratio</tspan>     4× (radius is doubled)</text>
<text x="72" y="386" font-size="11" fill="#1a1714"><tspan font-weight="bold">Perceived</tspan>     ≈ 2.6× (Stevens exp ≈ 0.7)</text>
<text x="72" y="412" font-size="10" fill="#4a4540" font-style="italic">Three numbers, three different values. Reader is lost.</text>
<circle cx="460" cy="200" r="30" fill="#1a1714"/>
<circle cx="580" cy="200" r="42.4" fill="#1a1714"/>
<text x="460" y="248" font-size="10" fill="#4a4540" text-anchor="middle">value = 1</text>
<text x="580" y="260.4" font-size="10" fill="#4a4540" text-anchor="middle">value = 2</text>
<rect x="400" y="320" width="250" height="110" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="412" y="342" font-size="11" fill="#1a1714"><tspan font-weight="bold">Data ratio</tspan>     2× (1 → 2)</text>
<text x="412" y="364" font-size="11" fill="#1a1714"><tspan font-weight="bold">Area ratio</tspan>     2× (matches data)</text>
<text x="412" y="386" font-size="11" fill="#1a1714"><tspan font-weight="bold">Perceived</tspan>     ≈ 1.6× (Stevens still bites)</text>
<text x="412" y="412" font-size="10" fill="#4a4540" font-style="italic">Two numbers match. As close as perception allows.</text>
<text x="350.0" y="468" font-size="10" fill="#4a4540" text-anchor="middle" font-style="italic">The divergence between data, area, and perception is why d3.scaleSqrt() exists.</text>
</svg>