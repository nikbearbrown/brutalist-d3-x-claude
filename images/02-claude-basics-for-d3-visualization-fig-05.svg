<svg viewBox="0 0 700 360" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
  </marker>
</defs>

<!-- Background -->
<rect x="0" y="0" width="700" height="360" fill="#FFFFFF"/>

<!-- Title -->
<text x="350" y="38" font-family="'EB Garamond', Georgia, serif" font-size="14" font-weight="bold" fill="#2a1a0e" text-anchor="middle">Four-Step Workflow</text>

<!-- Box 1: AUDIT -->
<rect x="32" y="62" width="130" height="110" rx="0" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="1"/>
<text x="97" y="86" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="bold" fill="#2a1a0e" text-anchor="middle" letter-spacing="0.08em">AUDIT</text>
<line x1="52" y1="94" x2="142" y2="94" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="4 3"/>
<text x="97" y="114" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#2a1a0e" text-anchor="middle">Channel</text>
<text x="97" y="128" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#2a1a0e" text-anchor="middle">decomposition</text>
<text x="97" y="156" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#545454" text-anchor="middle">tool: Claude chat</text>

<!-- Arrow 1-2 -->
<line x1="162" y1="117" x2="192" y2="117" stroke="#2a1a0e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- Box 2: PROMPT -->
<rect x="200" y="62" width="130" height="110" rx="0" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="1"/>
<text x="265" y="86" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="bold" fill="#2a1a0e" text-anchor="middle" letter-spacing="0.08em">PROMPT</text>
<line x1="220" y1="94" x2="310" y2="94" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="4 3"/>
<text x="265" y="114" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#2a1a0e" text-anchor="middle">Four-move</text>
<text x="265" y="128" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#2a1a0e" text-anchor="middle">structure</text>
<text x="265" y="156" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#545454" text-anchor="middle">tool: Claude Code</text>

<!-- Arrow 2-3 -->
<line x1="330" y1="117" x2="360" y2="117" stroke="#2a1a0e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- Box 3: BUILD (dark fill, white text) -->
<rect x="368" y="62" width="130" height="110" rx="0" fill="#6B3520" stroke="#2a1a0e" stroke-width="1"/>
<text x="433" y="86" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.08em">BUILD</text>
<line x1="388" y1="94" x2="478" y2="94" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="4 3"/>
<text x="433" y="114" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#FFFFFF" text-anchor="middle">Generate</text>
<text x="433" y="128" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#FFFFFF" text-anchor="middle">HTML</text>
<text x="433" y="156" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#F5EFE8" text-anchor="middle">tool: Claude Code</text>

<!-- Arrow 3-4 -->
<line x1="498" y1="117" x2="528" y2="117" stroke="#2a1a0e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- Box 4: VERIFY (darkest fill, white text) -->
<rect x="536" y="62" width="132" height="110" rx="0" fill="#1A3A5C" stroke="#2a1a0e" stroke-width="1"/>
<text x="602" y="86" font-family="'IBM Plex Mono', monospace" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.08em">VERIFY</text>
<line x1="556" y1="94" x2="648" y2="94" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="4 3"/>
<text x="602" y="114" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#FFFFFF" text-anchor="middle">Three-layer</text>
<text x="602" y="128" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#FFFFFF" text-anchor="middle">stack</text>
<text x="602" y="156" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#F5EFE8" text-anchor="middle">tool: Browser</text>

<!-- "If skipped" divider line -->
<line x1="32" y1="186" x2="668" y2="186" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="4 3"/>

<!-- Failure notes below each box -->
<text x="97" y="208" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#545454" text-anchor="middle" font-style="italic">Channels assigned</text>
<text x="97" y="222" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#545454" text-anchor="middle" font-style="italic">by guess</text>

<text x="265" y="208" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#545454" text-anchor="middle" font-style="italic">Model makes</text>
<text x="265" y="222" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#545454" text-anchor="middle" font-style="italic">5+ decisions</text>

<text x="433" y="208" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#545454" text-anchor="middle" font-style="italic">No iteration if</text>
<text x="433" y="222" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#545454" text-anchor="middle" font-style="italic">prompt was weak</text>

<text x="602" y="208" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#545454" text-anchor="middle" font-style="italic">Ship on hope</text>

<!-- "What failure looks like" label -->
<text x="350" y="256" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#545454" text-anchor="middle">What failure looks like if the step is skipped</text>

<!-- Caption -->
<text x="350" y="310" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#2a1a0e" text-anchor="middle" font-style="italic">The pattern is not overhead. It is the work.</text>

<!-- Bottom hairline -->
<line x1="32" y1="330" x2="668" y2="330" stroke="#D4D4D4" stroke-dasharray="4 3" stroke-width="0.75"/>
</svg>