<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="'EB Garamond', Georgia, 'Times New Roman', serif">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
  </marker>
</defs>

<!-- Background -->
<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

<!-- Title -->
<text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2a1a0e">Research Hours Climb Through the Year</text>

<!-- Subtitle label -->
<text x="350" y="46" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#545454" letter-spacing="0.08em">MONTHLY RESEARCH HOURS</text>

<!-- Chart area: x=72..648, y=60..350 => w=576, h=290 -->
<rect x="72" y="60" width="576" height="290" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="0.75"/>

<!-- Y-axis: 0 to 200, gridlines every 40 -->
<!-- y scale: 0 -> y=350, 200 -> y=60. Per unit: 290/200 = 1.45px -->
<!-- 0: 350, 40: 292, 80: 234, 120: 176, 160: 118, 200: 60 -->
<text x="68" y="354" text-anchor="end" font-size="10" fill="#545454">0</text>
<text x="68" y="296" text-anchor="end" font-size="10" fill="#545454">40</text>
<text x="68" y="238" text-anchor="end" font-size="10" fill="#545454">80</text>
<text x="68" y="180" text-anchor="end" font-size="10" fill="#545454">120</text>
<text x="68" y="122" text-anchor="end" font-size="10" fill="#545454">160</text>
<text x="68" y="64" text-anchor="end" font-size="10" fill="#545454">200</text>

<!-- Horizontal gridlines (dashed) -->
<line x1="72" y1="292" x2="648" y2="292" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="4,3"/>
<line x1="72" y1="234" x2="648" y2="234" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="4,3"/>
<line x1="72" y1="176" x2="648" y2="176" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="4,3"/>
<line x1="72" y1="118" x2="648" y2="118" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="4,3"/>

<!-- Zero baseline -->
<line x1="72" y1="350" x2="648" y2="350" stroke="#2a1a0e" stroke-width="1"/>

<!-- X-axis: 12 months, evenly spaced from x=96 to x=624, step=48 -->
<!-- Data: Jan=40, Feb=55, Mar=50, Apr=70, May=85, Jun=95, Jul=110, Aug=120, Sep=105, Oct=130, Nov=145, Dec=160 -->
<!-- x positions: 96, 144, 192, 240, 288, 336, 384, 432, 480, 528, 576, 624 -->
<!-- y = 350 - value*1.45 -->
<!-- Jan: 350-58=292, Feb: 350-79.75=270.25, Mar: 350-72.5=277.5, Apr: 350-101.5=248.5 -->
<!-- May: 350-123.25=226.75, Jun: 350-137.75=212.25, Jul: 350-159.5=190.5, Aug: 350-174=176 -->
<!-- Sep: 350-152.25=197.75, Oct: 350-188.5=161.5, Nov: 350-210.25=139.75, Dec: 350-232=118 -->

<!-- Area polygon (closed to baseline) -->
<polygon points="96,292 144,270.25 192,277.5 240,248.5 288,226.75 336,212.25 384,190.5 432,176 480,197.75 528,161.5 576,139.75 624,118 624,350 96,350" fill="#6B3520" opacity="0.4"/>

<!-- Line on top -->
<polyline points="96,292 144,270.25 192,277.5 240,248.5 288,226.75 336,212.25 384,190.5 432,176 480,197.75 528,161.5 576,139.75 624,118" fill="none" stroke="#6B3520" stroke-width="1.5"/>

<!-- Data dots -->
<circle cx="96" cy="292" r="2.5" fill="#6B3520"/>
<circle cx="144" cy="270.25" r="2.5" fill="#6B3520"/>
<circle cx="192" cy="277.5" r="2.5" fill="#6B3520"/>
<circle cx="240" cy="248.5" r="2.5" fill="#6B3520"/>
<circle cx="288" cy="226.75" r="2.5" fill="#6B3520"/>
<circle cx="336" cy="212.25" r="2.5" fill="#6B3520"/>
<circle cx="384" cy="190.5" r="2.5" fill="#6B3520"/>
<circle cx="432" cy="176" r="2.5" fill="#6B3520"/>
<circle cx="480" cy="197.75" r="2.5" fill="#6B3520"/>
<circle cx="528" cy="161.5" r="2.5" fill="#6B3520"/>
<circle cx="576" cy="139.75" r="2.5" fill="#6B3520"/>
<circle cx="624" cy="118" r="2.5" fill="#6B3520"/>

<!-- X-axis month labels -->
<text x="96" y="368" text-anchor="middle" font-size="10" fill="#2a1a0e">Jan</text>
<text x="144" y="368" text-anchor="middle" font-size="10" fill="#2a1a0e">Feb</text>
<text x="192" y="368" text-anchor="middle" font-size="10" fill="#2a1a0e">Mar</text>
<text x="240" y="368" text-anchor="middle" font-size="10" fill="#2a1a0e">Apr</text>
<text x="288" y="368" text-anchor="middle" font-size="10" fill="#2a1a0e">May</text>
<text x="336" y="368" text-anchor="middle" font-size="10" fill="#2a1a0e">Jun</text>
<text x="384" y="368" text-anchor="middle" font-size="10" fill="#2a1a0e">Jul</text>
<text x="432" y="368" text-anchor="middle" font-size="10" fill="#2a1a0e">Aug</text>
<text x="480" y="368" text-anchor="middle" font-size="10" fill="#2a1a0e">Sep</text>
<text x="528" y="368" text-anchor="middle" font-size="10" fill="#2a1a0e">Oct</text>
<text x="576" y="368" text-anchor="middle" font-size="10" fill="#2a1a0e">Nov</text>
<text x="624" y="368" text-anchor="middle" font-size="10" fill="#2a1a0e">Dec</text>

<!-- Y-axis label -->
<text x="32" y="205" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#545454" letter-spacing="0.08em" transform="rotate(-90 32 205)">HOURS</text>

<!-- Caption -->
<text x="350" y="400" text-anchor="middle" font-size="11" fill="#545454" font-style="italic">Area fill encodes cumulative weight — zero baseline required.</text>
</svg>