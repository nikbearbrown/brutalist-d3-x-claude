<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="18" font-weight="600" fill="#2a1a0e">Trimodal Distribution</text>

  <!-- Chart area -->
  <rect x="72" y="42" width="596" height="320" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- X-axis: 0-100. Left=72 (0), Right=668 (100). 1 unit = 5.96px -->
  <!-- Y-axis: density. Top=42 (max), Bottom=362 (0) -->

  <!-- X-axis labels -->
  <text x="72" y="378" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#545454">0</text>
  <text x="191" y="378" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#545454">20</text>
  <text x="310" y="378" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#545454">40</text>
  <text x="430" y="378" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#545454">60</text>
  <text x="549" y="378" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#545454">80</text>
  <text x="668" y="378" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#545454">100</text>

  <!-- X-axis label -->
  <text x="370" y="395" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#545454" letter-spacing="0.08em">VALUE</text>

  <!-- Y-axis label -->
  <text x="38" y="200" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#545454" letter-spacing="0.08em" transform="rotate(-90,38,200)">DENSITY</text>

  <!-- Y gridlines -->
  <line x1="72" y1="282" x2="668" y2="282" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="72" y1="202" x2="668" y2="202" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="72" y1="122" x2="668" y2="122" stroke="#D4D4D4" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Trimodal density curve -->
  <!-- Three peaks at x=20(y~80), x=50(y~110), x=80(y~95) -->
  <!-- Mapped: x20=191, x50=370, x80=549 -->
  <!-- Peak heights: peak1 density high=82, peak2=112, peak3=90 (mapped to chart) -->
  <!-- Using a smooth path with the filled area -->

  <!-- Filled area under curve -->
  <path d="M72,362
    C72,362 90,360 108,355
    C126,348 144,335 155,310
    C166,285 175,200 185,130
    C190,100 195,85 200,82
    C205,85 215,100 225,140
    C235,180 245,250 260,300
    C275,330 290,345 310,350
    C320,348 330,335 340,305
    C350,270 355,200 362,140
    C366,110 370,92 375,90
    C380,92 385,110 390,145
    C400,200 410,270 425,310
    C435,335 450,348 470,352
    C490,355 505,345 520,320
    C530,290 540,220 548,155
    C552,120 555,100 560,95
    C565,100 570,120 578,160
    C586,210 595,280 610,325
    C625,350 645,358 668,362
    L668,362 Z" fill="#6B3520" opacity="0.3" stroke="none"/>

  <!-- Density curve line -->
  <path d="M72,362
    C72,362 90,360 108,355
    C126,348 144,335 155,310
    C166,285 175,200 185,130
    C190,100 195,85 200,82
    C205,85 215,100 225,140
    C235,180 245,250 260,300
    C275,330 290,345 310,350
    C320,348 330,335 340,305
    C350,270 355,200 362,140
    C366,110 370,92 375,90
    C380,92 385,110 390,145
    C400,200 410,270 425,310
    C435,335 450,348 470,352
    C490,355 505,345 520,320
    C530,290 540,220 548,155
    C552,120 555,100 560,95
    C565,100 570,120 578,160
    C586,210 595,280 610,325
    C625,350 645,358 668,362" fill="none" stroke="#6B3520" stroke-width="2"/>

  <!-- Mode 1 vertical dashed line at x=20 (191px) -->
  <line x1="200" y1="82" x2="200" y2="362" stroke="#C8102E" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="200" y="72" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" font-weight="500" fill="#C8102E" letter-spacing="0.08em">MODE 1</text>

  <!-- Mode 2 vertical dashed line at x=50 (370px) -->
  <line x1="375" y1="90" x2="375" y2="362" stroke="#C8102E" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="375" y="72" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" font-weight="500" fill="#C8102E" letter-spacing="0.08em">MODE 2</text>

  <!-- Mode 3 vertical dashed line at x=80 (549px) -->
  <line x1="560" y1="95" x2="560" y2="362" stroke="#C8102E" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="560" y="72" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" font-weight="500" fill="#C8102E" letter-spacing="0.08em">MODE 3</text>

  <!-- Mean line (doesn't correspond to any mode) at x=48 (358px) -->
  <line x1="358" y1="42" x2="358" y2="362" stroke="#C8860E" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="340" y="52" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-size="8" font-weight="500" fill="#C8860E" letter-spacing="0.08em">MEAN</text>

  <!-- Caption -->
  <text x="350" y="412" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-style="italic" fill="#545454">Three peaks, three sub-populations. The mean describes none of them.</text>
</svg>