<text x="600.8333333333333" y="230" font-size="10" fill="#4a4540" text-anchor="middle">Part-to-whole</text>
<line x1="434.3333333333333" y1="150" x2="600.8333333333333" y2="210" stroke="#8a8480" stroke-width="0.75" stroke-dasharray="3 2"/>
<line x1="267.8333333333333" y1="242" x2="603.0" y2="162" stroke="#8a8480" stroke-width="0.75" stroke-dasharray="3 2"/>
<line x1="378.8333333333333" y1="242" x2="603.0" y2="162" stroke="#8a8480" stroke-width="0.75" stroke-dasharray="3 2"/>
<line x1="489.8333333333333" y1="242" x2="603.0" y2="162" stroke="#8a8480" stroke-width="0.75" stroke-dasharray="3 2"/>
<line x1="600.8333333333333" y1="242" x2="603.0" y2="162" stroke="#8a8480" stroke-width="0.75" stroke-dasharray="3 2"/>
<rect x="60" y="300" width="580" height="100" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="74" y="322" font-size="11" font-weight="bold" fill="#1a1714">Worked path — humanitarian funding case:</text>
<text x="74" y="342" font-size="11" fill="#1a1714"><tspan font-weight="bold">Step 1.</tspan> Key message: "Three sectors absorbed 45% of all funding."</text>
<text x="74" y="358" font-size="11" fill="#1a1714"><tspan font-weight="bold">Step 2.</tspan> 14 categorical sectors × one quantitative measure (USD millions).</text>
<text x="74" y="374" font-size="11" fill="#1a1714"><tspan font-weight="bold">Step 3.</tspan> Functional category: <tspan font-weight="bold">Comparison</tspan> (ranking the top three).</text>
<text x="74" y="390" font-size="11" fill="#1a1714"><tspan font-weight="bold">Step 4.</tspan> Specific form: <tspan font-weight="bold">horizontal bar chart, sorted descending.</tspan></text>
</svg>