<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
  </marker>
</defs>

<!-- Background -->
<rect x="0" y="0" width="700" height="480" fill="#FFFFFF"/>

<!-- Title -->
<text x="350" y="36" font-family="'EB Garamond', Georgia, serif" font-size="14" font-weight="bold" fill="#2a1a0e" text-anchor="middle">Cairo's four-step framework</text>

<!-- === TOP ROW: Four steps === -->
<!-- Box 1: Key Message -->
<rect x="32" y="68" width="138" height="56" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="1"/>
<text x="101" y="90" font-family="'EB Garamond', Georgia, serif" font-size="11" font-weight="bold" fill="#2a1a0e" text-anchor="middle">1. Key Message</text>
<text x="101" y="108" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#545454" text-anchor="middle" font-style="italic">single sentence</text>

<!-- Arrow 1→2 -->
<line x1="170" y1="96" x2="198" y2="96" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Box 2: Data Structure -->
<rect x="204" y="68" width="138" height="56" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="1"/>
<text x="273" y="90" font-family="'EB Garamond', Georgia, serif" font-size="11" font-weight="bold" fill="#2a1a0e" text-anchor="middle">2. Data Structure</text>
<text x="273" y="108" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#545454" text-anchor="middle" font-style="italic">attribute types &amp; counts</text>

<!-- Arrow 2→3 -->
<line x1="342" y1="96" x2="370" y2="96" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Box 3: Functional Category -->
<rect x="376" y="68" width="150" height="56" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="1"/>
<text x="451" y="90" font-family="'EB Garamond', Georgia, serif" font-size="11" font-weight="bold" fill="#2a1a0e" text-anchor="middle">3. Functional Category</text>
<text x="451" y="108" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#545454" text-anchor="middle" font-style="italic">FT Visual Vocabulary</text>

<!-- Arrow 3→4 -->
<line x1="526" y1="96" x2="545" y2="96" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Box 4: Specific Form -->
<rect x="551" y="68" width="117" height="56" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="1"/>
<text x="609" y="90" font-family="'EB Garamond', Georgia, serif" font-size="11" font-weight="bold" fill="#2a1a0e" text-anchor="middle">4. Specific Form</text>
<text x="609" y="108" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#545454" text-anchor="middle" font-style="italic">chart type named</text>

<!-- === CATEGORY BOXES === -->
<rect x="128" y="186" width="104" height="28" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="0.75"/>
<text x="180" y="204" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#545454" text-anchor="middle">Comparison</text>

<rect x="266" y="186" width="104" height="28" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="0.75"/>
<text x="318" y="204" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#545454" text-anchor="middle">Change over time</text>

<rect x="404" y="186" width="104" height="28" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="0.75"/>
<text x="456" y="204" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#545454" text-anchor="middle">Distribution</text>

<rect x="542" y="186" width="104" height="28" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="0.75"/>
<text x="594" y="204" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#545454" text-anchor="middle">Part-to-whole</text>

<!-- Dashed lines: Functional Category (box 3 bottom center) → each category box top center -->
<line x1="451" y1="124" x2="180" y2="186" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="3 2"/>
<line x1="451" y1="124" x2="318" y2="186" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="3 2"/>
<line x1="451" y1="124" x2="456" y2="186" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="3 2"/>
<line x1="451" y1="124" x2="594" y2="186" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="3 2"/>

<!-- Dashed lines: each category box top center → Specific Form (box 4 bottom center) -->
<line x1="180" y1="186" x2="609" y2="124" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="3 2"/>
<line x1="318" y1="186" x2="609" y2="124" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="3 2"/>
<line x1="456" y1="186" x2="609" y2="124" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="3 2"/>
<line x1="594" y1="186" x2="609" y2="124" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="3 2"/>

<!-- Ellipsis for remaining categories -->
<text x="390" y="236" font-family="'EB Garamond', Georgia, serif" font-size="10" fill="#545454" text-anchor="middle" font-style="italic">+ Relationship · Hierarchy · Flow · Spatial</text>

<!-- === WORKED EXAMPLE === -->
<rect x="50" y="268" width="600" height="126" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="1"/>

<text x="66" y="290" font-family="'EB Garamond', Georgia, serif" font-size="12" font-weight="bold" fill="#2a1a0e">Worked path — humanitarian funding case:</text>

<text x="66" y="314" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#2a1a0e"><tspan font-weight="bold">Step 1.</tspan> Key message: "Three sectors absorbed 45% of all funding."</text>
<text x="66" y="332" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#2a1a0e"><tspan font-weight="bold">Step 2.</tspan> 14 categorical sectors × one quantitative measure (USD millions).</text>
<text x="66" y="350" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#2a1a0e"><tspan font-weight="bold">Step 3.</tspan> Functional category: <tspan font-weight="bold">Comparison</tspan> (ranking the top three).</text>
<text x="66" y="368" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#2a1a0e"><tspan font-weight="bold">Step 4.</tspan> Specific form: <tspan font-weight="bold">horizontal bar chart, sorted descending.</tspan></text>

<!-- Caption -->
<text x="350" y="426" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#2a1a0e" text-anchor="middle" font-style="italic">Key Message → Data Structure → Functional Category → Specific Form.</text>
<text x="350" y="444" font-family="'EB Garamond', Georgia, serif" font-size="11" fill="#2a1a0e" text-anchor="middle" font-style="italic">The chart follows the message, not the dataset.</text>
</svg>
