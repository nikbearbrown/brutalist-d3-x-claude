<text x="265.66666666666663" y="132" font-size="10" fill="#4a4540" text-anchor="middle" font-style="italic">attribute types &amp; counts</text>
<rect x="369.3333333333333" y="90" width="130" height="60" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="434.3333333333333" y="112" font-size="11" font-weight="bold" fill="#1a1714" text-anchor="middle">3. Functional Category</text>
<text x="434.3333333333333" y="132" font-size="10" fill="#4a4540" text-anchor="middle" font-style="italic">FT Visual Vocabulary</text>
<rect x="538.0" y="90" width="130" height="60" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="603.0" y="112" font-size="11" font-weight="bold" fill="#1a1714" text-anchor="middle">4. Specific Form</text>
<text x="603.0" y="132" font-size="10" fill="#4a4540" text-anchor="middle" font-style="italic">chart type named</text>
<line x1="164.0" y1="120.0" x2="194.66666666666666" y2="120.0" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="332.66666666666663" y1="120.0" x2="363.3333333333333" y2="120.0" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="501.3333333333333" y1="120.0" x2="532.0" y2="120.0" stroke="#1a1714" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="215.33333333333331" y="210" width="105" height="32" fill="#fdfcfb" stroke="#8a8480" stroke-width="0.75"/>
