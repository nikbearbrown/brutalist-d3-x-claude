<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <!-- Chart area -->
  <rect x="32" y="32" width="636" height="356" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Title -->
  <text x="350" y="58" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="20" fill="#2a1a0e" font-weight="bold">AI Humanitarian Footprint by Sector</text>

  <!-- Caption -->
  <text x="350" y="378" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="12" fill="#545454" font-style="italic">Circle area encodes sector size. Nesting shows hierarchy.</text>

  <!-- Outer containing circle -->
  <circle cx="350" cy="210" r="148" fill="none" stroke="#D4D4D4" stroke-width="1.5"/>

  <!-- Label at top of outer circle -->
  <text x="350" y="80" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">AI HUMANITARIAN</text>

  <!-- Inner circles packed within the outer circle -->
  <!-- Crisis Response: r=70, centered left-of-center -->
  <circle cx="310" cy="190" r="70" fill="#C8102E" fill-opacity="0.4" stroke="#C8102E" stroke-width="1.5"/>
  <text x="310" y="185" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="14" fill="#2a1a0e">Crisis</text>
  <text x="310" y="202" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="14" fill="#2a1a0e">Response</text>

  <!-- Healthcare: r=55, right-of-center top -->
  <circle cx="425" cy="175" r="55" fill="#1A3A5C" fill-opacity="0.4" stroke="#1A3A5C" stroke-width="1.5"/>
  <text x="425" y="178" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" fill="#2a1a0e">Healthcare</text>

  <!-- Logistics: r=40, lower right (pulled inward) -->
  <circle cx="425" cy="265" r="40" fill="#6B3520" fill-opacity="0.4" stroke="#6B3520" stroke-width="1.5"/>
  <text x="425" y="268" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="12" fill="#2a1a0e">Logistics</text>

  <!-- Education: r=30, lower left -->
  <circle cx="290" cy="295" r="30" fill="#C8860E" fill-opacity="0.4" stroke="#C8860E" stroke-width="1.5"/>
  <text x="290" y="298" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#2a1a0e">Education</text>

  <!-- Agriculture: r=22, far left (pulled inward) -->
  <circle cx="238" cy="235" r="22" fill="#545454" fill-opacity="0.4" stroke="#545454" stroke-width="1.5"/>
  <text x="238" y="233" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9" fill="#2a1a0e">Agri-</text>
  <text x="238" y="244" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9" fill="#2a1a0e">culture</text>

  <!-- Legend -->
  <circle cx="80" cy="400" r="5" fill="#C8102E" fill-opacity="0.4"/>
  <text x="90" y="403" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#2a1a0e" letter-spacing="0.08em">CRISIS RESPONSE</text>
  <circle cx="210" cy="400" r="5" fill="#1A3A5C" fill-opacity="0.4"/>
  <text x="220" y="403" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#2a1a0e" letter-spacing="0.08em">HEALTHCARE</text>
  <circle cx="315" cy="400" r="5" fill="#6B3520" fill-opacity="0.4"/>
  <text x="325" y="403" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#2a1a0e" letter-spacing="0.08em">LOGISTICS</text>
  <circle cx="410" cy="400" r="5" fill="#C8860E" fill-opacity="0.4"/>
  <text x="420" y="403" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#2a1a0e" letter-spacing="0.08em">EDUCATION</text>
  <circle cx="515" cy="400" r="5" fill="#545454" fill-opacity="0.4"/>
  <text x="525" y="403" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#2a1a0e" letter-spacing="0.08em">AGRICULTURE</text>
</svg>