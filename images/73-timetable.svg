<rect x="152" y="251" width="80" height="38" fill="#6B3520"/>
<rect x="252" y="251" width="80" height="38" fill="#6B3520"/>
<rect x="352" y="251" width="80" height="38" fill="#C8102E"/>
<rect x="452" y="251" width="80" height="38" fill="#6B3520"/>

<!-- Row 5: Coastal Link — empty, Running at 08:00, Running at 10:00, Delayed at 12:00, Running at 14:00 -->
<rect x="252" y="301" width="80" height="38" fill="#6B3520"/>
<rect x="352" y="301" width="80" height="38" fill="#6B3520"/>
<rect x="452" y="301" width="80" height="38" fill="#C8102E"/>
<rect x="552" y="301" width="80" height="38" fill="#6B3520"/>

