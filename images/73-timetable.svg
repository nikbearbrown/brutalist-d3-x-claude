<text x="138" y="175" text-anchor="end" font-size="10" fill="#2a1a0e">Nairobi-Mombasa</text>
<text x="138" y="225" text-anchor="end" font-size="10" fill="#2a1a0e">Western Corridor</text>
<text x="138" y="275" text-anchor="end" font-size="10" fill="#2a1a0e">Northeast Express</text>
<text x="138" y="325" text-anchor="end" font-size="10" fill="#2a1a0e">Coastal Link</text>

