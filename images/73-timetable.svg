<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="'EB Garamond', Georgia, 'Times New Roman', serif">

<!-- Background -->
<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

<!-- Title -->
<text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2a1a0e">Monday Service Schedule</text>

<!-- Subtitle -->
<text x="350" y="46" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#545454" letter-spacing="0.08em">TIMETABLE — ROUTE STATUS BY TIME SLOT</text>

<!-- Chart area -->
<rect x="32" y="60" width="636" height="310" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="0.75"/>

<!-- Grid structure -->
<!-- Column headers (time slots) -->
<!-- x positions: 180, 280, 380, 480, 580 (each col ~100px wide) -->
<text x="192" y="85" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">06:00</text>
<text x="292" y="85" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">08:00</text>
<text x="392" y="85" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">10:00</text>
<text x="492" y="85" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">12:00</text>
<text x="592" y="85" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">14:00</text>

<!-- Horizontal grid lines -->
<line x1="142" y1="95" x2="642" y2="95" stroke="#D4D4D4" stroke-width="0.5"/>
<line x1="142" y1="145" x2="642" y2="145" stroke="#D4D4D4" stroke-width="0.5"/>
<line x1="142" y1="195" x2="642" y2="195" stroke="#D4D4D4" stroke-width="0.5"/>
<line x1="142" y1="245" x2="642" y2="245" stroke="#D4D4D4" stroke-width="0.5"/>
<line x1="142" y1="295" x2="642" y2="295" stroke="#D4D4D4" stroke-width="0.5"/>
<line x1="142" y1="345" x2="642" y2="345" stroke="#D4D4D4" stroke-width="0.5"/>

<!-- Vertical grid lines -->
<line x1="142" y1="95" x2="142" y2="345" stroke="#D4D4D4" stroke-width="0.5"/>
<line x1="242" y1="95" x2="242" y2="345" stroke="#D4D4D4" stroke-width="0.5"/>
<line x1="342" y1="95" x2="342" y2="345" stroke="#D4D4D4" stroke-width="0.5"/>
<line x1="442" y1="95" x2="442" y2="345" stroke="#D4D4D4" stroke-width="0.5"/>
<line x1="542" y1="95" x2="542" y2="345" stroke="#D4D4D4" stroke-width="0.5"/>
<line x1="642" y1="95" x2="642" y2="345" stroke="#D4D4D4" stroke-width="0.5"/>

