<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="'EB Garamond', Georgia, 'Times New Roman', serif">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
  </marker>
</defs>

<!-- Background -->
<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

<!-- LEFT PANEL: Density Curves + Box Plots -->
<rect x="32" y="32" width="308" height="356" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
<text x="186" y="56" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">DENSITY + BOX PLOTS</text>

<!-- Chart area -->
<rect x="52" y="68" width="270" height="240" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="1"/>

<!-- Normal distribution curve (top) -->
<path d="M62,175 C82,175 102,170 132,140 C152,115 162,90 187,80 C212,90 222,115 242,140 C272,170 292,175 312,175" fill="#6B3520" opacity="0.3" stroke="#6B3520" stroke-width="1.5"/>
<text x="187" y="78" text-anchor="middle" font-size="8" fill="#6B3520">Normal</text>

<!-- Bimodal distribution curve (below) -->
<path d="M62,240 C82,240 92,230 112,210 C122,198 132,190 142,188 C152,190 162,210 172,220 C182,225 192,220 202,210 C212,198 222,188 232,186 C242,188 252,210 272,230 C282,238 292,240 312,240" fill="#1A3A5C" opacity="0.3" stroke="#1A3A5C" stroke-width="1.5"/>
<text x="187" y="252" text-anchor="middle" font-size="8" fill="#1A3A5C">Bimodal</text>

<!-- Box plot for Normal -->
<rect x="145" y="155" width="84" height="14" fill="#F5EFE8" stroke="#2a1a0e" stroke-width="1"/>
<line x1="187" y1="155" x2="187" y2="169" stroke="#C8102E" stroke-width="2"/>
<line x1="120" y1="162" x2="145" y2="162" stroke="#2a1a0e" stroke-width="1"/>
<line x1="229" y1="162" x2="260" y2="162" stroke="#2a1a0e" stroke-width="1"/>

<!-- Box plot for Bimodal (same median/IQR — looks similar) -->
<rect x="145" y="222" width="84" height="14" fill="#F5EFE8" stroke="#2a1a0e" stroke-width="1"/>
<line x1="187" y1="222" x2="187" y2="236" stroke="#C8102E" stroke-width="2"/>
<line x1="120" y1="229" x2="145" y2="229" stroke="#2a1a0e" stroke-width="1"/>
<line x1="229" y1="229" x2="260" y2="229" stroke="#2a1a0e" stroke-width="1"/>

<!-- "=" badge -->
<rect x="162" y="272" width="50" height="22" fill="#D4D4D4"/>
<text x="187" y="288" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="14" fill="#2a1a0e" font-weight="bold">=</text>

<!-- Explanation -->
<text x="186" y="320" text-anchor="middle" font-size="10" fill="#545454" font-style="italic">Box plots look identical</text>
<text x="186" y="335" text-anchor="middle" font-size="10" fill="#545454" font-style="italic">despite different shapes</text>

<!-- Legend -->
<rect x="62" y="350" width="12" height="12" fill="#6B3520" opacity="0.3" stroke="#6B3520" stroke-width="1"/>
<text x="78" y="360" font-size="9" fill="#545454">Normal</text>
<rect x="130" y="350" width="12" height="12" fill="#1A3A5C" opacity="0.3" stroke="#1A3A5C" stroke-width="1"/>
<text x="146" y="360" font-size="9" fill="#545454">Bimodal</text>

<!-- RIGHT PANEL: Violin Plots -->
<rect x="360" y="32" width="308" height="356" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
<text x="514" y="56" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">VIOLIN PLOTS</text>

<!-- Chart area -->
<rect x="380" y="68" width="270" height="240" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="1"/>

<!-- Normal violin (symmetric bell) -->
<path d="M445,100 C445,100 420,140 415,175 C420,210 445,250 445,250 L465,250 C465,250 490,210 495,175 C490,140 465,100 465,100 Z" fill="#6B3520" opacity="0.3" stroke="#6B3520" stroke-width="1.5"/>
<text x="455" y="92" text-anchor="middle" font-size="8" fill="#6B3520">Normal</text>
<!-- Median line -->
<line x1="430" y1="175" x2="480" y2="175" stroke="#C8102E" stroke-width="1.5"/>

<!-- Bimodal violin (two bulges) -->
<path d="M545,100 C545,100 520,120 515,140 C520,155 535,158 540,165 C535,172 520,175 515,195 C520,220 545,250 545,250 L575,250 C575,250 600,220 605,195 C600,175 585,172 580,165 C585,158 600,155 605,140 C600,120 575,100 575,100 Z" fill="#1A3A5C" opacity="0.3" stroke="#1A3A5C" stroke-width="1.5"/>
<text x="560" y="92" text-anchor="middle" font-size="8" fill="#1A3A5C">Bimodal</text>
<!-- Median line -->
<line x1="530" y1="175" x2="590" y2="175" stroke="#C8102E" stroke-width="1.5"/>

<!-- "DIFF" badge -->
<rect x="478" y="272" width="72" height="22" fill="#C8102E"/>
<text x="514" y="287" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="11" fill="#FFFFFF" letter-spacing="0.08em">&#x2260; DIFF</text>

<!-- Explanation -->
<text x="514" y="320" text-anchor="middle" font-size="10" fill="#545454" font-style="italic">Violin plots reveal</text>
<text x="514" y="335" text-anchor="middle" font-size="10" fill="#545454" font-style="italic">the shape difference</text>

<!-- Legend -->
<rect x="390" y="350" width="12" height="12" fill="#6B3520" opacity="0.3" stroke="#6B3520" stroke-width="1"/>
<text x="406" y="360" font-size="9" fill="#545454">Normal</text>
<rect x="458" y="350" width="12" height="12" fill="#1A3A5C" opacity="0.3" stroke="#1A3A5C" stroke-width="1"/>
<text x="474" y="360" font-size="9" fill="#545454">Bimodal</text>
</svg>