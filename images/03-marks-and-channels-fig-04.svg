<text x="86" y="402" font-size="11" fill="#1a1714"><tspan font-weight="bold">The distortion is the argument.</tspan> Left panel is what Nightingale published in 1858. Right panel is what</text>
<text x="86" y="420" font-size="11" fill="#1a1714">the data would show if area were scaled honestly. The difference between the two is the rhetorical</text>
<text x="86" y="438" font-size="11" fill="#1a1714">choice — and the rhetorical choice saved soldiers&apos; lives.</text>
