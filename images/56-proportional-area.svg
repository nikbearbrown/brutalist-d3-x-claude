<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="'EB Garamond', Georgia, 'Times New Roman', serif">

<!-- Background -->
<rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

<!-- Title -->
<text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2a1a0e">Global AI for Good Investment by Region</text>

<!-- Subtitle label -->
<text x="350" y="46" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" fill="#545454" letter-spacing="0.08em">PROPORTIONAL AREA CHART</text>

<!-- Chart area -->
<rect x="32" y="60" width="636" height="310" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="0.75" rx="0"/>

<!-- Circles sized by sqrt of value for area encoding -->
<!-- Max value: 4.2B -> max radius ~80. Scale: r = sqrt(value/4.2) * 80 -->
<!-- North America: 4.2B -> r=80, East Asia: 3.8B -> r=76.1, Europe: 2.1B -> r=56.6, South Asia: 0.9B -> r=37.0, Africa: 0.5B -> r=27.6 -->

<!-- Horizontal arrangement: centered, no overlap, 10px gap between circles -->
<!-- Radii: NA=70, EA=66, EU=49, SA=32, AF=24 -->
<!-- Total span: 70+70 + 10 + 66+66 + 10 + 49+49 + 10 + 32+32 + 10 + 24+24 = 522 -->
<!-- Chart area: 636px. Offset = (636-522)/2 + 32 = 89. First cx = 89+70 = 159 -->

<!-- All circles bottom-aligned: largest circle bottom at y=280, cy = 280-r -->

<!-- North America — $4.2B -->
<circle cx="159" cy="210" r="70" fill="#C8102E" opacity="0.85"/>
<text x="159" y="214" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">$4.2B</text>

<!-- East Asia — $3.8B — cx = 159+70+10+66 = 305 -->
<circle cx="305" cy="214" r="66" fill="#1A3A5C" opacity="0.85"/>
<text x="305" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">$3.8B</text>

<!-- Europe — $2.1B — cx = 305+66+10+49 = 430 -->
<circle cx="430" cy="231" r="49" fill="#6B3520" opacity="0.85"/>
<text x="430" y="235" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">$2.1B</text>

<!-- South Asia — $0.9B — cx = 430+49+10+32 = 521 -->
<circle cx="521" cy="248" r="32" fill="#C8860E" opacity="0.85"/>
<text x="521" y="252" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">$0.9B</text>

<!-- Africa — $0.5B — cx = 521+32+10+24 = 587 -->
<circle cx="587" cy="256" r="24" fill="#545454" opacity="0.85"/>
<text x="587" y="260" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">$0.5B</text>

<!-- Region labels below circles -->
<text x="159" y="296" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">NORTH AMERICA</text>
<text x="305" y="296" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">EAST ASIA</text>
<text x="430" y="296" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">EUROPE</text>
<text x="521" y="296" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">SOUTH ASIA</text>
<text x="587" y="296" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" fill="#2a1a0e" letter-spacing="0.08em">AFRICA</text>

<!-- Caption -->
<text x="350" y="395" text-anchor="middle" font-size="11" font-style="italic" fill="#545454">North America + East Asia hold 62% of global investment. Area encodes magnitude.</text>

</svg>
