<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connection Map — Hub-and-Spoke Aid Network</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --color-bg: #FFFFFF;
    --color-surface: #F5EFE8;
    --color-ink: #2a1a0e;
    --color-mark: #6B3520;
    --color-red: #C8102E;
    --color-slate: #1A3A5C;
    --color-ochre: #C8860E;
    --color-secondary: #545454;
    --color-border: #D4D4D4;
    --font-body: 'EB Garamond', Georgia, 'Times New Roman', serif;
    --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1a1410;
      --color-surface: #2a2018;
      --color-ink: #e8ddd0;
      --color-mark: #c4886a;
      --color-red: #e8525a;
      --color-slate: #6a9cc8;
      --color-ochre: #e8b84a;
      --color-secondary: #a0968a;
      --color-border: #4a4038;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--color-bg);
    color: var(--color-ink);
    font-family: var(--font-body);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 32px;
  }

  h1 {
    font-family: var(--font-body);
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--color-ink);
    margin-bottom: 4px;
    text-align: center;
  }

  .subtitle {
    font-family: var(--font-body);
    font-size: 1rem;
    font-style: italic;
    color: var(--color-secondary);
    margin-bottom: 24px;
    text-align: center;
  }

  #chart-container {
    width: 100%;
    max-width: 960px;
    position: relative;
  }

  svg {
    width: 100%;
    height: auto;
    display: block;
  }

  .tooltip {
    position: absolute;
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    padding: 8px 12px;
    font-family: var(--font-body);
    font-size: 0.9rem;
    color: var(--color-ink);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .connection:hover {
    stroke-opacity: 1;
    cursor: pointer;
  }

  .city:hover {
    cursor: pointer;
  }

  .city:focus {
    outline: 2px solid var(--color-red);
    outline-offset: 2px;
  }
</style>
</head>
<body>
<h1>Hub-and-Spoke Aid Network</h1>
<p class="subtitle">Line thickness encodes coordination volume. Europe and North America anchor the network.</p>
<div id="chart-container">
  <div class="tooltip" id="tooltip"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
const cities = [
  { name: "London", lon: -0.1, lat: 51.5, color: "var(--color-red)", r: 6, type: "hub" },
  { name: "Washington", lon: -77.0, lat: 38.9, color: "var(--color-red)", r: 6, type: "hub" },
  { name: "Nairobi", lon: 36.8, lat: -1.3, color: "var(--color-slate)", r: 5, type: "field" },
  { name: "Amman", lon: 35.9, lat: 31.9, color: "var(--color-slate)", r: 5, type: "field" },
  { name: "Geneva", lon: 6.1, lat: 46.2, color: "var(--color-mark)", r: 4, type: "hub" },
  { name: "Berlin", lon: 13.4, lat: 52.5, color: "var(--color-mark)", r: 4, type: "hub" },
  { name: "Addis Ababa", lon: 38.7, lat: 9.0, color: "var(--color-ochre)", r: 4, type: "field" },
  { name: "Bangkok", lon: 100.5, lat: 13.8, color: "var(--color-ochre)", r: 3, type: "field" }
];

const connections = [
  { source: "London", target: "Nairobi", volume: 3, label: "High volume" },
  { source: "Washington", target: "Amman", volume: 3, label: "High volume" },
  { source: "Geneva", target: "Nairobi", volume: 2, label: "Medium volume" },
  { source: "London", target: "Addis Ababa", volume: 2, label: "Medium volume" },
  { source: "Berlin", target: "Amman", volume: 1, label: "Low volume" },
  { source: "Washington", target: "Bangkok", volume: 1, label: "Low volume" }
];

const width = 960;
const height = 500;
const margin = { top: 32, right: 32, bottom: 32, left: 32 };

const projection = d3.geoNaturalEarth1()
  .scale(160)
  .translate([width / 2, height / 2]);

const path = d3.geoPath().projection(projection);

const svg = d3.select("#chart-container")
  .append("svg")
  .attr("viewBox", `0 0 ${width} ${height}`);

// Chart background
svg.append("rect")
  .attr("x", margin.left)
  .attr("y", margin.top)
  .attr("width", width - margin.left - margin.right)
  .attr("height", height - margin.top - margin.bottom)
  .attr("fill", "var(--color-surface)")
  .attr("stroke", "var(--color-border)")
  .attr("stroke-width", 0.75);

// World outline (simplified land)
const land = svg.append("g").attr("class", "land");
d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json").then(world => {
  const landFeature = topojson.feature(world, world.objects.land);
  land.selectAll("path")
    .data(landFeature.features)
    .join("path")
    .attr("d", path)
    .attr("fill", "none")
    .attr("stroke", "var(--color-border)")
    .attr("stroke-width", 0.75);
}).catch(() => {
  // Fallback: draw simple continental shapes
  land.append("rect")
    .attr("x", margin.left + 10)
    .attr("y", margin.top + 10)
    .attr("width", width - margin.left - margin.right - 20)
    .attr("height", height - margin.top - margin.bottom - 20)
    .attr("fill", "none")
    .attr("stroke", "var(--color-border)")
    .attr("stroke-width", 0.5);
});

const tooltip = d3.select("#tooltip");

const cityMap = {};
cities.forEach(c => {
  const [x, y] = projection([c.lon, c.lat]);
  c.x = x;
  c.y = y;
  cityMap[c.name] = c;
});

// Draw connections as great-circle arcs
const strokeScale = d3.scaleOrdinal()
  .domain([1, 2, 3])
  .range([1.5, 3, 5]);

const opacityScale = d3.scaleOrdinal()
  .domain([1, 2, 3])
  .range([0.35, 0.55, 0.75]);

svg.selectAll(".connection")
  .data(connections)
  .join("path")
  .attr("class", "connection")
  .attr("d", d => {
    const s = cityMap[d.source];
    const t = cityMap[d.target];
    const line = { type: "LineString", coordinates: [[s.x, s.y].map((v, i) => projection.invert([s.x, s.y])[i]), [t.x, t.y].map((v, i) => projection.invert([t.x, t.y])[i])] };
    // Use geoPath for great-circle interpolation
    const lineGeo = { type: "LineString", coordinates: [[cityMap[d.source].x, cityMap[d.source].y].map((_, i) => i === 0 ? cityMap[d.source].x : cityMap[d.source].y)] };
    // Simpler: use quadratic bezier
    const mx = (s.x + t.x) / 2;
    const my = (s.y + t.y) / 2 - Math.abs(s.x - t.x) * 0.2;
    return `M ${s.x},${s.y} Q ${mx},${my} ${t.x},${t.y}`;
  })
  .attr("fill", "none")
  .attr("stroke", "var(--color-ink)")
  .attr("stroke-width", d => strokeScale(d.volume))
  .attr("stroke-opacity", d => opacityScale(d.volume))
  .on("mouseover", (event, d) => {
    tooltip.style("opacity", 1)
      .html(`<strong>${d.source} → ${d.target}</strong><br>${d.label}`)
      .style("left", (event.offsetX + 10) + "px")
      .style("top", (event.offsetY - 10) + "px");
  })
  .on("mouseout", () => tooltip.style("opacity", 0));

// Draw cities
const cityGroups = svg.selectAll(".city")
  .data(cities)
  .join("g")
  .attr("class", "city")
  .attr("tabindex", 0)
  .attr("role", "img")
  .attr("aria-label", d => `${d.name} — ${d.type}`)
  .on("mouseover", (event, d) => {
    tooltip.style("opacity", 1)
      .html(`<strong>${d.name}</strong><br>Type: ${d.type}`)
      .style("left", (event.offsetX + 10) + "px")
      .style("top", (event.offsetY - 10) + "px");
  })
  .on("mouseout", () => tooltip.style("opacity", 0))
  .on("focus", (event, d) => {
    tooltip.style("opacity", 1)
      .html(`<strong>${d.name}</strong><br>Type: ${d.type}`)
      .style("left", (d.x + 10) + "px")
      .style("top", (d.y - 10) + "px");
  })
  .on("blur", () => tooltip.style("opacity", 0));

cityGroups.append("circle")
  .attr("cx", d => d.x)
  .attr("cy", d => d.y)
  .attr("r", d => d.r)
  .attr("fill", d => d.color)
  .attr("stroke", "var(--color-ink)")
  .attr("stroke-width", 0.75);

cityGroups.append("text")
  .attr("x", d => d.x)
  .attr("y", d => d.y - d.r - 4)
  .attr("text-anchor", "middle")
  .attr("font-family", "var(--font-mono)")
  .attr("font-size", "9px")
  .attr("letter-spacing", "0.08em")
  .attr("fill", "var(--color-ink)")
  .text(d => d.name.toUpperCase());
</script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
</body>
</html>
