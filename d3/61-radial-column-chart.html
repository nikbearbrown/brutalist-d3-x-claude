<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radial Column Chart — Technology Readiness by Domain</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  :root {
    --color-bg: #FFFFFF;
    --color-ink: #2a1a0e;
    --color-red: #C8102E;
    --color-secondary: #545454;
    --color-border: #D4D4D4;
    --color-ochre: #C8860E;
    --color-surface: #F5EFE8;
    --color-mark: #6B3520;
    --color-slate: #1A3A5C;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1a1a1a;
      --color-ink: #e8e0d6;
      --color-surface: #2a2420;
      --color-secondary: #a0978e;
      --color-border: #444;
      --color-mark: #c28060;
      --color-red: #e05040;
      --color-slate: #5a9ad6;
      --color-ochre: #d4a030;
    }
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'EB Garamond', Georgia, 'Times New Roman', serif;
    background: var(--color-bg);
    color: var(--color-ink);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 32px;
  }
  #chart-container { width: 100%; max-width: 900px; }
  h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; color: var(--color-ink); }
  .subtitle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--color-secondary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .caption {
    font-size: 0.9rem;
    color: var(--color-secondary);
    font-style: italic;
    margin-top: 12px;
  }
  .tooltip {
    position: absolute;
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    padding: 8px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--color-ink);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }
</style>
</head>
<body>
<div id="chart-container">
  <h1>Technology Readiness by Domain</h1>
  <div class="subtitle">RADIAL COLUMN CHART</div>
  <div id="chart" role="img" aria-label="Radial column chart showing technology readiness scores for 8 domains. Cloud leads at 95, Security trails at 40."></div>
  <div class="caption">Cloud leads at 95 — Security trails at 40. The silhouette reveals domain maturity at a glance.</div>
</div>
<div class="tooltip" id="tooltip"></div>
<script>
const data = [
  { category: "AI", value: 92 },
  { category: "ML", value: 85 },
  { category: "NLP", value: 73 },
  { category: "Vision", value: 68 },
  { category: "Robotics", value: 55 },
  { category: "Data", value: 88 },
  { category: "Cloud", value: 95 },
  { category: "Security", value: 40 }
];

const maxValue = 95;
const container = document.getElementById("chart");
const tooltip = document.getElementById("tooltip");

function draw() {
  container.innerHTML = "";
  const width = container.clientWidth;
  const height = Math.min(width * 0.75, 600);
  const cx = width / 2;
  const cy = height / 2;
  const innerR = Math.min(width, height) * 0.1;
  const outerR = Math.min(width, height) * 0.38;

  const svg = d3.select(container).append("svg")
    .attr("width", width).attr("height", height)
    .attr("viewBox", `0 0 ${width} ${height}`);

  svg.append("title").text("Technology Readiness by Domain — Radial Column Chart");
  svg.append("desc").text("8 technology domains arranged radially with columns radiating outward from center. Cloud is highest at 95, Security lowest at 40.");

  // Chart area background
  svg.append("rect").attr("x", 32).attr("y", 0).attr("width", width - 64).attr("height", height)
    .attr("fill", "var(--color-surface)").attr("stroke", "var(--color-border)").attr("stroke-width", 0.75);

  const g = svg.append("g").attr("transform", `translate(${cx},${cy})`);

  // Concentric rings
  const ringValues = [20, 40, 60, 80, 100];
  const rScale = d3.scaleLinear().domain([0, 100]).range([innerR, outerR]);

  ringValues.forEach(v => {
    g.append("circle").attr("r", rScale(v))
      .attr("fill", "none").attr("stroke", "var(--color-border)")
      .attr("stroke-width", 0.5).attr("stroke-dasharray", "3,3");
  });

  // Angle scale
  const angleScale = d3.scaleBand()
    .domain(data.map(d => d.category))
    .range([0, 2 * Math.PI])
    .padding(0.15);

  const arc = d3.arc()
    .innerRadius(innerR)
    .outerRadius(d => rScale(d.value))
    .startAngle(d => angleScale(d.category))
    .endAngle(d => angleScale(d.category) + angleScale.bandwidth())
    .padAngle(0.02);

  // Bars
  g.selectAll(".bar").data(data).enter().append("path")
    .attr("class", "bar")
    .attr("d", d => arc(d))
    .attr("fill", d => d.value === maxValue ? "var(--color-red)" : "var(--color-mark)")
    .attr("tabindex", 0)
    .attr("role", "graphics-symbol")
    .attr("aria-label", d => `${d.category}: ${d.value}`)
    .on("mouseenter", function(event, d) {
      tooltip.style.opacity = 1;
      tooltip.innerHTML = `<strong>${d.category}</strong><br>Score: ${d.value}`;
    })
    .on("mousemove", function(event) {
      tooltip.style.left = event.pageX + 12 + "px";
      tooltip.style.top = event.pageY - 28 + "px";
    })
    .on("mouseleave", () => { tooltip.style.opacity = 0; })
    .on("focus", function(event, d) {
      tooltip.style.opacity = 1;
      tooltip.innerHTML = `<strong>${d.category}</strong><br>Score: ${d.value}`;
      const rect = this.getBoundingClientRect();
      tooltip.style.left = rect.x + rect.width / 2 + "px";
      tooltip.style.top = rect.y - 40 + "px";
    })
    .on("blur", () => { tooltip.style.opacity = 0; });

  // Category labels
  data.forEach(d => {
    const angle = angleScale(d.category) + angleScale.bandwidth() / 2 - Math.PI / 2;
    const labelR = outerR + 22;
    const x = Math.cos(angle) * labelR;
    const y = Math.sin(angle) * labelR;
    g.append("text")
      .attr("x", x).attr("y", y)
      .attr("text-anchor", Math.cos(angle) > 0.1 ? "start" : Math.cos(angle) < -0.1 ? "end" : "middle")
      .attr("dominant-baseline", "central")
      .attr("font-family", "'IBM Plex Mono', monospace")
      .attr("font-size", "0.65rem")
      .attr("fill", d.value === maxValue ? "var(--color-red)" : "var(--color-ink)")
      .attr("letter-spacing", "0.08em")
      .text(d.category.toUpperCase());
  });
}

draw();
window.addEventListener("resize", draw);
</script>
</body>
</html>
