<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Map — Household Aid Disbursements by State</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --color-bg: #FFFFFF;
    --color-surface: #F5EFE8;
    --color-ink: #2a1a0e;
    --color-mark: #6B3520;
    --color-red: #C8102E;
    --color-slate: #1A3A5C;
    --color-ochre: #C8860E;
    --color-secondary: #545454;
    --color-border: #D4D4D4;
    --color-fill: #F5EFE8;
    --font-body: 'EB Garamond', Georgia, 'Times New Roman', serif;
    --font-sans: 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1a1410;
      --color-surface: #2a2018;
      --color-ink: #e8ddd0;
      --color-mark: #c4886a;
      --color-red: #e8525a;
      --color-slate: #6a9cc8;
      --color-ochre: #e8b84a;
      --color-secondary: #a0968a;
      --color-border: #4a4038;
      --color-fill: #2a2018;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--color-bg);
    color: var(--color-ink);
    font-family: var(--font-body);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 32px;
  }

  h1 {
    font-family: var(--font-body);
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--color-ink);
    margin-bottom: 4px;
    text-align: center;
  }

  .subtitle {
    font-family: var(--font-body);
    font-size: 1rem;
    font-style: italic;
    color: var(--color-secondary);
    margin-bottom: 24px;
    text-align: center;
  }

  #chart-container {
    width: 100%;
    max-width: 960px;
    position: relative;
  }

  svg {
    width: 100%;
    height: auto;
    display: block;
  }

  .state-path {
    fill: var(--color-fill);
    stroke: var(--color-border);
    stroke-width: 0.5;
  }

  .bubble {
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .bubble:hover {
    opacity: 0.85;
  }

  .tooltip {
    position: absolute;
    pointer-events: none;
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    padding: 10px 14px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--color-ink);
    line-height: 1.6;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .tooltip .label {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 4px;
  }
</style>
</head>
<body>
<h1>Bubble Map</h1>
<p class="subtitle">California and Texas Absorb Nearly Half of All Household Aid Disbursements</p>
<div id="chart-container">
  <div class="tooltip" id="tooltip"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script>
const stateData = [
  { state: "California", abbr: "CA", fips: "06", value: 4200000, highlighted: true },
  { state: "Texas", abbr: "TX", fips: "48", value: 3100000, highlighted: true },
  { state: "New York", abbr: "NY", fips: "36", value: 1800000, highlighted: false },
  { state: "Florida", abbr: "FL", fips: "12", value: 1600000, highlighted: false },
  { state: "Illinois", abbr: "IL", fips: "17", value: 980000, highlighted: false },
  { state: "Pennsylvania", abbr: "PA", fips: "42", value: 920000, highlighted: false },
  { state: "Ohio", abbr: "OH", fips: "39", value: 870000, highlighted: false },
  { state: "Georgia", abbr: "GA", fips: "13", value: 810000, highlighted: false },
  { state: "North Carolina", abbr: "NC", fips: "37", value: 760000, highlighted: false },
  { state: "Washington", abbr: "WA", fips: "53", value: 620000, highlighted: false },
  { state: "Michigan", abbr: "MI", fips: "26", value: 740000, highlighted: false },
  { state: "Arizona", abbr: "AZ", fips: "04", value: 580000, highlighted: false },
  { state: "Virginia", abbr: "VA", fips: "51", value: 540000, highlighted: false },
  { state: "Massachusetts", abbr: "MA", fips: "25", value: 490000, highlighted: false },
  { state: "New Jersey", abbr: "NJ", fips: "34", value: 680000, highlighted: false }
];

const container = document.getElementById('chart-container');
const tooltip = document.getElementById('tooltip');

const usAtlasUrl = 'https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json';

async function render() {
  d3.select('#chart-container svg').remove();

  const width = container.clientWidth;
  const height = Math.min(width * 0.62, 600);

  const svg = d3.select('#chart-container')
    .append('svg')
    .attr('viewBox', `0 0 ${width} ${height}`);

  svg.append('title').text('Household Aid Disbursements by State');
  svg.append('desc').text('Bubble map of US states showing household aid disbursements with California and Texas highlighted as largest recipients.');

  // Background
  svg.append('rect')
    .attr('width', width)
    .attr('height', height)
    .attr('fill', 'var(--color-fill)')
    .attr('stroke', 'var(--color-border)')
    .attr('stroke-width', 0.75)
    .attr('rx', 0);

  const projection = d3.geoAlbersUsa()
    .fitSize([width - 64, height - 80], { type: "Sphere" })
    .translate([width / 2, height / 2 - 10]);

  const path = d3.geoPath().projection(projection);

  const r = d3.scaleSqrt()
    .domain([0, d3.max(stateData, d => d.value)])
    .range([0, Math.min(width, height) * 0.06]);

  try {
    const us = await d3.json(usAtlasUrl);
    const states = topojson.feature(us, us.objects.states);

    // Draw state outlines
    svg.selectAll('.state-path')
      .data(states.features)
      .join('path')
      .attr('class', 'state-path')
      .attr('d', path);

    // Create lookup of centroids
    const centroids = {};
    states.features.forEach(f => {
      const c = path.centroid(f);
      if (c[0] && c[1]) {
        centroids[f.id] = c;
      }
    });

    // Draw bubbles (largest first)
    const sorted = [...stateData].sort((a, b) => b.value - a.value);

    sorted.forEach(d => {
      const fipsNum = String(parseInt(d.fips));
      const centroid = centroids[fipsNum];
      if (!centroid) return;

      const g = svg.append('g')
        .attr('class', 'bubble')
        .attr('tabindex', 0)
        .attr('role', 'graphics-symbol')
        .attr('aria-label', `${d.state}: ${d3.format(',')(d.value)} households`);

      g.append('circle')
        .attr('cx', centroid[0])
        .attr('cy', centroid[1])
        .attr('r', r(d.value))
        .attr('fill', d.highlighted ? 'var(--color-red)' : 'var(--color-mark)')
        .attr('opacity', 0.5)
        .attr('stroke', 'var(--color-ink)')
        .attr('stroke-width', 1);

      // Abbreviation label (only for larger bubbles)
      if (r(d.value) > 10) {
        g.append('text')
          .attr('x', centroid[0])
          .attr('y', centroid[1] + 4)
          .attr('text-anchor', 'middle')
          .attr('font-family', 'var(--font-mono)')
          .attr('font-size', '9px')
          .attr('letter-spacing', '0.08em')
          .attr('fill', '#FFFFFF')
          .text(d.abbr);
      }

      g.on('mouseenter', (event) => {
        tooltip.innerHTML = `
          <div class="label">${d.state} (${d.abbr})</div>
          <div>Households: ${d3.format(',')(d.value)}</div>
          ${d.highlighted ? '<div style="color:var(--color-red)">Top recipient</div>' : ''}
        `;
        tooltip.style.opacity = 1;
        moveTooltip(event);
      })
      .on('mousemove', moveTooltip)
      .on('mouseleave', () => { tooltip.style.opacity = 0; })
      .on('focus', (event) => {
        tooltip.innerHTML = `<div class="label">${d.state}</div><div>${d3.format(',')(d.value)} households</div>`;
        tooltip.style.opacity = 1;
      })
      .on('blur', () => { tooltip.style.opacity = 0; });
    });

    // Size legend
    const legendX = 48;
    const legendY = height - 60;
    const legendValues = [500000, 2000000, 4000000];

    svg.append('text')
      .attr('x', legendX)
      .attr('y', legendY - 35)
      .attr('font-family', 'var(--font-mono)')
      .attr('font-size', '9px')
      .attr('letter-spacing', '0.08em')
      .attr('fill', 'var(--color-secondary)')
      .text('SIZE LEGEND');

    let lx = legendX;
    legendValues.forEach(v => {
      const rad = r(v);
      svg.append('circle')
        .attr('cx', lx + rad)
        .attr('cy', legendY)
        .attr('r', rad)
        .attr('fill', 'var(--color-mark)')
        .attr('opacity', 0.4)
        .attr('stroke', 'var(--color-ink)')
        .attr('stroke-width', 0.5);

      svg.append('text')
        .attr('x', lx + rad)
        .attr('y', legendY + rad + 14)
        .attr('text-anchor', 'middle')
        .attr('font-family', 'var(--font-body)')
        .attr('font-size', '9px')
        .attr('fill', 'var(--color-secondary)')
        .text(d3.format('.1s')(v));

      lx += rad * 2 + 20;
    });

  } catch (err) {
    // Fallback: draw simple positioned bubbles without map
    const fallbackPositions = {
      "CA": [0.12, 0.55], "TX": [0.38, 0.72], "NY": [0.82, 0.28],
      "FL": [0.78, 0.78], "IL": [0.60, 0.38], "PA": [0.78, 0.32],
      "OH": [0.70, 0.35], "GA": [0.72, 0.62], "NC": [0.78, 0.52],
      "WA": [0.12, 0.15], "MI": [0.65, 0.25], "AZ": [0.22, 0.60],
      "VA": [0.76, 0.45], "MA": [0.86, 0.22], "NJ": [0.82, 0.35]
    };

    stateData.forEach(d => {
      const pos = fallbackPositions[d.abbr];
      if (!pos) return;
      svg.append('circle')
        .attr('cx', pos[0] * width)
        .attr('cy', pos[1] * height)
        .attr('r', r(d.value))
        .attr('fill', d.highlighted ? 'var(--color-red)' : 'var(--color-mark)')
        .attr('opacity', 0.5)
        .attr('stroke', 'var(--color-ink)')
        .attr('stroke-width', 1);

      svg.append('text')
        .attr('x', pos[0] * width)
        .attr('y', pos[1] * height + 4)
        .attr('text-anchor', 'middle')
        .attr('font-family', 'var(--font-mono)')
        .attr('font-size', '9px')
        .attr('letter-spacing', '0.08em')
        .attr('fill', '#FFFFFF')
        .text(d.abbr);
    });
  }
}

function moveTooltip(event) {
  const rect = container.getBoundingClientRect();
  let xPos = event.clientX - rect.left + 16;
  let yPos = event.clientY - rect.top - 10;
  if (xPos + 220 > rect.width) xPos = xPos - 240;
  tooltip.style.left = xPos + 'px';
  tooltip.style.top = yPos + 'px';
}

render();
window.addEventListener('resize', render);
</script>
</body>
</html>
