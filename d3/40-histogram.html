<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Histogram — Distribution of Commute Times</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --color-bg: #FFFFFF;
    --color-surface: #F5EFE8;
    --color-ink: #2a1a0e;
    --color-mark: #6B3520;
    --color-red: #C8102E;
    --color-slate: #1A3A5C;
    --color-ochre: #C8860E;
    --color-secondary: #545454;
    --color-border: #D4D4D4;
    --font-body: 'EB Garamond', Georgia, 'Times New Roman', serif;
    --font-sans: 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1a1410;
      --color-surface: #2a2018;
      --color-ink: #e8ddd0;
      --color-mark: #c4886a;
      --color-red: #e8525a;
      --color-slate: #6a9cc8;
      --color-ochre: #e8b84a;
      --color-secondary: #a0968a;
      --color-border: #4a4038;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--color-bg);
    color: var(--color-ink);
    font-family: var(--font-body);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 32px;
  }

  h1 {
    font-family: var(--font-body);
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--color-ink);
    margin-bottom: 4px;
    text-align: center;
  }

  .subtitle {
    font-family: var(--font-body);
    font-size: 1rem;
    font-style: italic;
    color: var(--color-secondary);
    margin-bottom: 24px;
    text-align: center;
  }

  #chart-container {
    width: 100%;
    max-width: 700px;
    position: relative;
  }

  svg {
    width: 100%;
    height: auto;
    display: block;
  }

  .tooltip {
    position: absolute;
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    padding: 8px 12px;
    font-family: var(--font-body);
    font-size: 0.9rem;
    color: var(--color-ink);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
  }

  .hist-bar {
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .hist-bar:hover {
    opacity: 0.8;
    stroke: var(--color-ink);
    stroke-width: 1;
  }

  .hist-bar:focus {
    outline: none;
    stroke: var(--color-red);
    stroke-width: 1.5;
  }
</style>
</head>
<body>
<h1>Distribution of Commute Times</h1>
<p class="subtitle">Most commutes cluster 20-40 minutes. Long tail of extreme commuters.</p>
<div id="chart-container">
  <div class="tooltip" id="tooltip"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const bins = [
  { x0: 0, x1: 5, count: 2 },
  { x0: 5, x1: 10, count: 5 },
  { x0: 10, x1: 15, count: 12 },
  { x0: 15, x1: 20, count: 22 },
  { x0: 20, x1: 25, count: 35 },
  { x0: 25, x1: 30, count: 42 },
  { x0: 30, x1: 35, count: 38 },
  { x0: 35, x1: 40, count: 28 },
  { x0: 40, x1: 45, count: 18 },
  { x0: 45, x1: 50, count: 12 },
  { x0: 50, x1: 55, count: 8 },
  { x0: 55, x1: 60, count: 5 },
  { x0: 60, x1: 65, count: 3 },
  { x0: 65, x1: 70, count: 2 },
  { x0: 70, x1: 75, count: 1 },
  { x0: 75, x1: 80, count: 1 }
];

const width = 700;
const height = 420;
const margin = { top: 32, right: 40, bottom: 56, left: 60 };

const innerWidth = width - margin.left - margin.right;
const innerHeight = height - margin.top - margin.bottom;

const xScale = d3.scaleLinear()
  .domain([0, 80])
  .range([margin.left, width - margin.right]);

const yScale = d3.scaleLinear()
  .domain([0, 45])
  .range([height - margin.bottom, margin.top]);

const svg = d3.select("#chart-container")
  .append("svg")
  .attr("viewBox", `0 0 ${width} ${height}`)
  .attr("role", "img")
  .attr("aria-label", "Histogram showing right-skewed distribution of commute times peaking at 25-30 minutes");

// Chart background
svg.append("rect")
  .attr("x", margin.left)
  .attr("y", margin.top)
  .attr("width", innerWidth)
  .attr("height", innerHeight)
  .attr("fill", "var(--color-surface)")
  .attr("stroke", "var(--color-border)")
  .attr("stroke-width", 0.75);

// Y-axis gridlines
const yTicks = [0, 10, 20, 30, 40];
yTicks.forEach(t => {
  if (t > 0) {
    svg.append("line")
      .attr("x1", margin.left)
      .attr("x2", width - margin.right)
      .attr("y1", yScale(t))
      .attr("y2", yScale(t))
      .attr("stroke", "var(--color-border)")
      .attr("stroke-width", 0.5)
      .attr("stroke-dasharray", "3,3");
  }
});

// Y-axis labels
yTicks.forEach(t => {
  svg.append("text")
    .attr("x", margin.left - 8)
    .attr("y", yScale(t) + 4)
    .attr("text-anchor", "end")
    .attr("font-family", "var(--font-mono)")
    .attr("font-size", "11px")
    .attr("fill", "var(--color-secondary)")
    .text(t);
});

// Y-axis title
svg.append("text")
  .attr("x", -(margin.top + innerHeight / 2))
  .attr("y", 16)
  .attr("text-anchor", "middle")
  .attr("transform", "rotate(-90)")
  .attr("font-family", "var(--font-mono)")
  .attr("font-size", "10px")
  .attr("fill", "var(--color-secondary)")
  .attr("letter-spacing", "0.08em")
  .text("COUNT");

// X-axis labels
const xTicks = [0, 10, 20, 30, 40, 50, 60, 70, 80];
xTicks.forEach(t => {
  svg.append("text")
    .attr("x", xScale(t))
    .attr("y", height - margin.bottom + 18)
    .attr("text-anchor", "middle")
    .attr("font-family", "var(--font-mono)")
    .attr("font-size", "11px")
    .attr("fill", "var(--color-secondary)")
    .text(t);
});

// X-axis title
svg.append("text")
  .attr("x", margin.left + innerWidth / 2)
  .attr("y", height - 6)
  .attr("text-anchor", "middle")
  .attr("font-family", "var(--font-mono)")
  .attr("font-size", "10px")
  .attr("fill", "var(--color-secondary)")
  .attr("letter-spacing", "0.08em")
  .text("COMMUTE MINUTES");

// Axes
svg.append("line")
  .attr("x1", margin.left)
  .attr("x2", width - margin.right)
  .attr("y1", height - margin.bottom)
  .attr("y2", height - margin.bottom)
  .attr("stroke", "var(--color-ink)")
  .attr("stroke-width", 0.75);

svg.append("line")
  .attr("x1", margin.left)
  .attr("x2", margin.left)
  .attr("y1", margin.top)
  .attr("y2", height - margin.bottom)
  .attr("stroke", "var(--color-ink)")
  .attr("stroke-width", 0.75);

const tooltip = d3.select("#tooltip");

// Histogram bars (adjacent, no gaps)
svg.selectAll(".hist-bar")
  .data(bins)
  .join("rect")
  .attr("class", "hist-bar")
  .attr("x", d => xScale(d.x0))
  .attr("y", d => yScale(d.count))
  .attr("width", d => xScale(d.x1) - xScale(d.x0))
  .attr("height", d => yScale(0) - yScale(d.count))
  .attr("fill", "var(--color-mark)")
  .attr("rx", 0)
  .attr("tabindex", 0)
  .attr("role", "img")
  .attr("aria-label", d => `${d.x0}-${d.x1} minutes: ${d.count} commuters`)
  .on("mouseover", function(event, d) {
    tooltip.style("opacity", 1)
      .html(`<strong>${d.x0}–${d.x1} minutes</strong><br>Count: ${d.count}`)
      .style("left", (event.offsetX + 14) + "px")
      .style("top", (event.offsetY - 14) + "px");
  })
  .on("mousemove", function(event) {
    tooltip.style("left", (event.offsetX + 14) + "px")
      .style("top", (event.offsetY - 14) + "px");
  })
  .on("mouseout", () => tooltip.style("opacity", 0))
  .on("focus", function(event, d) {
    tooltip.style("opacity", 1)
      .html(`<strong>${d.x0}–${d.x1} minutes</strong><br>Count: ${d.count}`)
      .style("left", (xScale(d.x0) + 14) + "px")
      .style("top", (yScale(d.count) - 14) + "px");
  })
  .on("blur", () => tooltip.style("opacity", 0));
</script>
</body>
</html>
