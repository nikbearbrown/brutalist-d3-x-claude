<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunburst — Investment by Sector and Subsector</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  :root {
    --color-white: #FFFFFF;
    --color-ink: #2a1a0e;
    --color-red: #C8102E;
    --color-secondary: #545454;
    --color-border: #D4D4D4;
    --color-ochre: #C8860E;
    --color-bg: #FFFFFF;
    --color-surface: #F5EFE8;
    --color-mark: #6B3520;
    --color-slate: #1A3A5C;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1a1a1a;
      --color-ink: #e8e0d6;
      --color-surface: #2a2420;
      --color-secondary: #a0978e;
      --color-border: #444;
      --color-mark: #c28060;
      --color-red: #e05040;
      --color-slate: #5a9ad6;
      --color-ochre: #d4a030;
    }
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'EB Garamond', Georgia, 'Times New Roman', serif;
    background: var(--color-bg);
    color: var(--color-ink);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 32px;
  }
  #chart-container { width: 100%; max-width: 900px; }
  h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; color: var(--color-ink); }
  .subtitle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--color-secondary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .caption { font-size: 0.9rem; color: var(--color-secondary); font-style: italic; margin-top: 12px; }
  .tooltip {
    position: absolute;
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    padding: 8px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--color-ink);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .arc-segment { cursor: pointer; }
  .arc-segment:hover { opacity: 0.85; }
  .arc-segment:focus { outline: 2px solid var(--color-ink); outline-offset: 1px; }
</style>
</head>
<body>
<div id="chart-container">
  <h1>Investment by Sector and Subsector</h1>
  <div class="subtitle">SUNBURST DIAGRAM — HOVER FOR DETAILS</div>
  <div id="chart" role="img" aria-label="Two-level sunburst diagram showing investment allocation: Tech, Health, and Finance sectors with subsectors in outer ring."></div>
  <div class="caption">Inner ring: sectors. Outer ring: subsectors within each sector.</div>
</div>
<div class="tooltip" id="tooltip"></div>

<script>
const data = {
  name: "Total",
  children: [
    {
      name: "Tech", color: "var(--color-red)",
      children: [
        { name: "AI / ML", value: 180 },
        { name: "Cloud", value: 120 },
        { name: "Devices", value: 100 }
      ]
    },
    {
      name: "Health", color: "var(--color-slate)",
      children: [
        { name: "Pharma", value: 200 },
        { name: "Med Devices", value: 150 }
      ]
    },
    {
      name: "Finance", color: "var(--color-mark)",
      children: [
        { name: "Banking", value: 100 },
        { name: "Insurance", value: 80 },
        { name: "Fintech", value: 70 }
      ]
    }
  ]
};

const sectorColors = { Tech: "var(--color-red)", Health: "var(--color-slate)", Finance: "var(--color-mark)" };

const width = 700, height = 520;
const radius = Math.min(width, height) / 2 - 60;

const svg = d3.select("#chart")
  .append("svg")
  .attr("viewBox", `0 0 ${width} ${height}`)
  .attr("preserveAspectRatio", "xMidYMid meet")
  .style("width", "100%")
  .style("height", "auto");

svg.append("title").text("Investment by Sector and Subsector — Sunburst Diagram");
svg.append("desc").text("Two-level sunburst: inner ring shows Tech (40%), Health (35%), Finance (25%). Outer ring shows subsectors.");

svg.append("rect").attr("width", width).attr("height", height).attr("fill", "var(--color-bg)");
svg.append("rect").attr("x", 32).attr("y", 32).attr("width", width - 64).attr("height", height - 80)
  .attr("fill", "var(--color-surface)").attr("stroke", "var(--color-border)").attr("stroke-width", 0.75);

const g = svg.append("g").attr("transform", `translate(${width / 2},${height / 2 - 10})`);

const root = d3.hierarchy(data).sum(d => d.value);

const partition = d3.partition().size([2 * Math.PI, radius]);
partition(root);

const arc = d3.arc()
  .startAngle(d => d.x0)
  .endAngle(d => d.x1)
  .innerRadius(d => d.y0 + 10)
  .outerRadius(d => d.y1 - 2);

const tooltip = d3.select("#tooltip");

g.selectAll("path")
  .data(root.descendants().filter(d => d.depth > 0))
  .join("path")
  .attr("class", "arc-segment")
  .attr("tabindex", 0)
  .attr("d", arc)
  .attr("fill", d => {
    if (d.depth === 1) return sectorColors[d.data.name];
    // Subsector: use parent color with opacity
    const parentColor = sectorColors[d.parent.data.name];
    return parentColor;
  })
  .attr("opacity", d => d.depth === 1 ? 0.9 : 0.55)
  .attr("stroke", "var(--color-bg)")
  .attr("stroke-width", 2)
  .attr("aria-label", d => `${d.data.name}: ${d.value}`)
  .on("mouseover", function(event, d) {
    d3.select(this).attr("opacity", 1);
    const pct = ((d.value / root.value) * 100).toFixed(1);
    const parent = d.depth > 1 ? ` (${d.parent.data.name})` : "";
    tooltip.style("opacity", 1)
      .html(`<strong>${d.data.name}</strong>${parent}<br>Value: ${d.value}<br>Share: ${pct}%`);
  })
  .on("mousemove", function(event) {
    tooltip.style("left", (event.pageX + 12) + "px").style("top", (event.pageY - 28) + "px");
  })
  .on("mouseout", function(event, d) {
    d3.select(this).attr("opacity", d.depth === 1 ? 0.9 : 0.55);
    tooltip.style("opacity", 0);
  });

// Labels for sectors
g.selectAll(".sector-label")
  .data(root.children)
  .join("text")
  .attr("class", "sector-label")
  .attr("transform", d => {
    const angle = (d.x0 + d.x1) / 2;
    const r = (d.y0 + d.y1) / 2 + 10;
    const x = Math.sin(angle) * r;
    const y = -Math.cos(angle) * r;
    return `translate(${x},${y})`;
  })
  .attr("text-anchor", "middle")
  .attr("font-family", "'IBM Plex Mono', monospace")
  .attr("font-size", "10px")
  .attr("font-weight", "600")
  .attr("letter-spacing", "0.08em")
  .attr("fill", "var(--color-bg)")
  .text(d => d.data.name.toUpperCase());

// Center label
g.append("text").attr("text-anchor", "middle").attr("dy", "0.35em")
  .attr("font-size", "13px").attr("font-weight", "bold").attr("fill", "var(--color-ink)")
  .text("Total");

// Legend
const legend = svg.append("g").attr("transform", `translate(${width / 2 - 180}, ${height - 32})`);
Object.entries(sectorColors).forEach(([name, color], i) => {
  const lg = legend.append("g").attr("transform", `translate(${i * 130}, 0)`);
  lg.append("rect").attr("width", 12).attr("height", 12).attr("fill", color);
  lg.append("text").attr("x", 18).attr("y", 10)
    .attr("font-family", "'IBM Plex Mono', monospace").attr("font-size", "11px")
    .attr("fill", "var(--color-ink)").text(name);
});
</script>
</body>
</html>
