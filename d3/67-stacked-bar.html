<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stacked Bar — Funding Sources Over Time</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  :root {
    --color-white: #FFFFFF;
    --color-ink: #2a1a0e;
    --color-red: #C8102E;
    --color-secondary: #545454;
    --color-border: #D4D4D4;
    --color-ochre: #C8860E;
    --color-bg: #FFFFFF;
    --color-surface: #F5EFE8;
    --color-mark: #6B3520;
    --color-slate: #1A3A5C;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1a1a1a;
      --color-ink: #e8e0d6;
      --color-surface: #2a2420;
      --color-secondary: #a0978e;
      --color-border: #444;
      --color-mark: #c28060;
      --color-red: #e05040;
      --color-slate: #5a9ad6;
      --color-ochre: #d4a030;
    }
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'EB Garamond', Georgia, 'Times New Roman', serif;
    background: var(--color-bg);
    color: var(--color-ink);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 32px;
  }
  #chart-container { width: 100%; max-width: 900px; }
  h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; color: var(--color-ink); }
  .subtitle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--color-secondary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .caption { font-size: 0.9rem; color: var(--color-secondary); font-style: italic; margin-top: 12px; }
  .tooltip {
    position: absolute;
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    padding: 8px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--color-ink);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .bar-segment:focus { outline: 2px solid var(--color-ink); outline-offset: 1px; }
</style>
</head>
<body>
<div id="chart-container">
  <h1>Funding Sources Over Time</h1>
  <div class="subtitle">STACKED BAR — HOVER FOR DETAILS</div>
  <div id="chart" role="img" aria-label="Stacked bar chart showing government, foundation, and private funding from 2021 to 2024. Private funding tripled over the period."></div>
  <div class="caption">Private funding tripled — government still anchors the base.</div>
</div>
<div class="tooltip" id="tooltip"></div>

<script>
const data = [
  { year: "2021", Government: 200, Foundation: 100, Private: 80 },
  { year: "2022", Government: 220, Foundation: 120, Private: 120 },
  { year: "2023", Government: 240, Foundation: 140, Private: 180 },
  { year: "2024", Government: 260, Foundation: 160, Private: 240 }
];

const categories = ["Government", "Foundation", "Private"];
const colors = { Government: "var(--color-ink)", Foundation: "var(--color-mark)", Private: "var(--color-red)" };

const width = 700, height = 480;
const margin = { top: 32, right: 32, bottom: 80, left: 72 };
const innerW = width - margin.left - margin.right;
const innerH = height - margin.top - margin.bottom;

const svg = d3.select("#chart")
  .append("svg")
  .attr("viewBox", `0 0 ${width} ${height}`)
  .attr("preserveAspectRatio", "xMidYMid meet")
  .style("width", "100%")
  .style("height", "auto");

svg.append("title").text("Funding Sources Over Time — Stacked Bar Chart");
svg.append("desc").text("Vertical stacked bars for 2021-2024 showing Government, Foundation, and Private funding. Private funding tripled from $80M to $240M.");

svg.append("rect").attr("width", width).attr("height", height).attr("fill", "var(--color-bg)");
svg.append("rect").attr("x", margin.left - 8).attr("y", margin.top - 8).attr("width", innerW + 16).attr("height", innerH + 16)
  .attr("fill", "var(--color-surface)").attr("stroke", "var(--color-border)").attr("stroke-width", 0.75);

const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

const x = d3.scaleBand().domain(data.map(d => d.year)).range([0, innerW]).padding(0.3);
const y = d3.scaleLinear().domain([0, 800]).range([innerH, 0]);

// Gridlines
[100, 200, 300, 400, 500, 600, 700, 800].forEach(v => {
  g.append("line").attr("x1", 0).attr("x2", innerW).attr("y1", y(v)).attr("y2", y(v))
    .attr("stroke", "var(--color-border)").attr("stroke-width", 0.5).attr("stroke-dasharray", "3,3");
});

// Baseline
g.append("line").attr("x1", 0).attr("x2", innerW).attr("y1", y(0)).attr("y2", y(0))
  .attr("stroke", "var(--color-ink)").attr("stroke-width", 1);

const stack = d3.stack().keys(categories);
const series = stack(data);

const tooltip = d3.select("#tooltip");

series.forEach((layer, li) => {
  g.selectAll(`.bar-${li}`)
    .data(layer)
    .join("rect")
    .attr("class", "bar-segment")
    .attr("tabindex", 0)
    .attr("x", d => x(d.data.year))
    .attr("y", d => y(d[1]))
    .attr("width", x.bandwidth())
    .attr("height", d => y(d[0]) - y(d[1]))
    .attr("fill", colors[categories[li]])
    .attr("aria-label", d => `${d.data.year} ${categories[li]}: $${d.data[categories[li]]}M`)
    .on("mouseover", function(event, d) {
      tooltip.style("opacity", 1)
        .html(`<strong>${d.data.year}</strong><br>${categories[li]}: $${d.data[categories[li]]}M`);
    })
    .on("mousemove", function(event) {
      tooltip.style("left", (event.pageX + 12) + "px").style("top", (event.pageY - 28) + "px");
    })
    .on("mouseout", () => tooltip.style("opacity", 0))
    .on("focus", function(event, d) {
      tooltip.style("opacity", 1)
        .html(`<strong>${d.data.year}</strong><br>${categories[li]}: $${d.data[categories[li]]}M`)
        .style("left", "50%").style("top", "0");
    })
    .on("blur", () => tooltip.style("opacity", 0));
});

// X axis
g.append("g").attr("transform", `translate(0,${innerH})`)
  .call(d3.axisBottom(x).tickSize(0))
  .call(g => g.select(".domain").remove())
  .selectAll("text")
  .attr("font-family", "'IBM Plex Mono', monospace")
  .attr("font-size", "11px")
  .attr("letter-spacing", "0.08em")
  .attr("fill", "var(--color-ink)");

// Y axis
g.append("g")
  .call(d3.axisLeft(y).ticks(8).tickFormat(d => `$${d}M`).tickSize(-innerW))
  .call(g => g.select(".domain").remove())
  .call(g => g.selectAll(".tick line").attr("stroke", "var(--color-border)").attr("stroke-dasharray", "3,3"))
  .selectAll("text")
  .attr("font-family", "'IBM Plex Mono', monospace")
  .attr("font-size", "9px")
  .attr("fill", "var(--color-secondary)");

// Legend
const legend = svg.append("g").attr("transform", `translate(${margin.left}, ${height - 30})`);
categories.forEach((cat, i) => {
  const lg = legend.append("g").attr("transform", `translate(${i * 160}, 0)`);
  lg.append("rect").attr("width", 12).attr("height", 12).attr("fill", colors[cat]);
  lg.append("text").attr("x", 18).attr("y", 10)
    .attr("font-family", "'IBM Plex Mono', monospace").attr("font-size", "11px")
    .attr("fill", "var(--color-ink)").text(cat);
});
</script>
</body>
</html>
