<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timetable — Monday Service Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  :root {
    --color-bg: #FFFFFF;
    --color-ink: #2a1a0e;
    --color-surface: #F5EFE8;
    --color-secondary: #545454;
    --color-border: #D4D4D4;
    --color-mark: #6B3520;
    --color-red: #C8102E;
    --color-slate: #1A3A5C;
    --color-ochre: #C8860E;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1a1a1a;
      --color-ink: #e8e0d6;
      --color-surface: #2a2420;
      --color-secondary: #a0978e;
      --color-border: #444;
      --color-mark: #c28060;
      --color-red: #e05040;
      --color-slate: #5a9ad6;
      --color-ochre: #d4a030;
    }
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'EB Garamond', Georgia, 'Times New Roman', serif;
    background: var(--color-bg);
    color: var(--color-ink);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 32px;
  }
  #chart-container { width: 100%; max-width: 900px; }
  h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; color: var(--color-ink); }
  .subtitle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--color-secondary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .caption { font-size: 0.9rem; color: var(--color-secondary); font-style: italic; margin-top: 12px; }
  .tooltip {
    position: absolute;
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    padding: 8px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--color-ink);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .legend { display: flex; gap: 20px; margin-top: 10px; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-ink); }
  .legend-swatch { width: 14px; height: 14px; }
</style>
</head>
<body>
<div id="chart-container">
  <h1>Monday Service Schedule</h1>
  <div class="subtitle">TIMETABLE — ROUTE STATUS BY TIME SLOT</div>
  <div id="chart" role="img" aria-label="Timetable showing Monday service schedule for 5 routes across 5 time slots"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background: var(--color-mark);"></div>RUNNING</div>
    <div class="legend-item"><div class="legend-swatch" style="background: var(--color-red);"></div>DELAYED</div>
    <div class="legend-item"><div class="legend-swatch" style="background: var(--color-border);"></div>CANCELLED</div>
  </div>
  <div class="caption">Western Corridor fully cancelled; delays on Garissa-Mandera and Northeast Express.</div>
</div>
<div class="tooltip" id="tooltip"></div>

<script>
const routes = ["Garissa-Mandera", "Nairobi-Mombasa", "Western Corridor", "Northeast Express", "Coastal Link"];
const timeSlots = ["06:00", "08:00", "10:00", "12:00", "14:00"];

const data = [
  { route: "Garissa-Mandera", time: "06:00", status: "running" },
  { route: "Garissa-Mandera", time: "08:00", status: "delayed" },
  { route: "Garissa-Mandera", time: "10:00", status: "running" },
  { route: "Garissa-Mandera", time: "14:00", status: "running" },
  { route: "Nairobi-Mombasa", time: "06:00", status: "running" },
  { route: "Nairobi-Mombasa", time: "08:00", status: "running" },
  { route: "Nairobi-Mombasa", time: "10:00", status: "running" },
  { route: "Nairobi-Mombasa", time: "12:00", status: "running" },
  { route: "Nairobi-Mombasa", time: "14:00", status: "running" },
  { route: "Western Corridor", time: "06:00", status: "cancelled" },
  { route: "Western Corridor", time: "08:00", status: "cancelled" },
  { route: "Western Corridor", time: "10:00", status: "cancelled" },
  { route: "Western Corridor", time: "12:00", status: "cancelled" },
  { route: "Western Corridor", time: "14:00", status: "cancelled" },
  { route: "Northeast Express", time: "06:00", status: "running" },
  { route: "Northeast Express", time: "08:00", status: "running" },
  { route: "Northeast Express", time: "10:00", status: "delayed" },
  { route: "Northeast Express", time: "12:00", status: "running" },
  { route: "Coastal Link", time: "08:00", status: "running" },
  { route: "Coastal Link", time: "10:00", status: "running" },
  { route: "Coastal Link", time: "12:00", status: "delayed" },
  { route: "Coastal Link", time: "14:00", status: "running" },
];

const width = 750;
const height = 480;
const margin = { top: 50, right: 32, bottom: 32, left: 170 };

const svg = d3.select("#chart")
  .append("svg")
  .attr("viewBox", `0 0 ${width} ${height}`)
  .attr("preserveAspectRatio", "xMidYMid meet")
  .style("width", "100%")
  .style("height", "auto");

svg.append("title").text("Monday Service Schedule — Timetable");
svg.append("desc").text("Grid-style timetable showing 5 routes across 5 time slots with running, delayed, and cancelled status.");

svg.append("rect").attr("width", width).attr("height", height).attr("fill", "var(--color-bg)");
svg.append("rect")
  .attr("x", margin.left - 10).attr("y", margin.top - 10)
  .attr("width", width - margin.left - margin.right + 20)
  .attr("height", height - margin.top - margin.bottom + 20)
  .attr("fill", "var(--color-surface)").attr("stroke", "var(--color-border)").attr("stroke-width", 0.75);

const x = d3.scaleBand().domain(timeSlots).range([margin.left, width - margin.right]).padding(0.08);
const y = d3.scaleBand().domain(routes).range([margin.top, height - margin.bottom]).padding(0.12);

const statusColor = { running: "var(--color-mark)", delayed: "var(--color-red)", cancelled: "var(--color-border)" };

// Grid lines
timeSlots.forEach(t => {
  svg.append("line")
    .attr("x1", x(t)).attr("x2", x(t))
    .attr("y1", margin.top - 5).attr("y2", height - margin.bottom + 5)
    .attr("stroke", "var(--color-border)").attr("stroke-width", 0.3);
});
routes.forEach(r => {
  svg.append("line")
    .attr("x1", margin.left - 5).attr("x2", width - margin.right + 5)
    .attr("y1", y(r) + y.bandwidth()).attr("y2", y(r) + y.bandwidth())
    .attr("stroke", "var(--color-border)").attr("stroke-width", 0.3);
});

// Column headers
svg.selectAll(".col-header")
  .data(timeSlots)
  .join("text")
  .attr("x", d => x(d) + x.bandwidth() / 2)
  .attr("y", margin.top - 18)
  .attr("text-anchor", "middle")
  .attr("font-family", "'IBM Plex Mono', monospace")
  .attr("font-size", "10px")
  .attr("letter-spacing", "0.08em")
  .attr("fill", "var(--color-ink)")
  .text(d => d);

// Row labels
svg.selectAll(".row-label")
  .data(routes)
  .join("text")
  .attr("x", margin.left - 16)
  .attr("y", d => y(d) + y.bandwidth() / 2 + 4)
  .attr("text-anchor", "end")
  .attr("font-size", "12px")
  .attr("fill", "var(--color-ink)")
  .text(d => d);

const tooltip = d3.select("#tooltip");

// Cells
svg.selectAll(".cell")
  .data(data)
  .join("rect")
  .attr("class", "cell")
  .attr("x", d => x(d.time))
  .attr("y", d => y(d.route))
  .attr("width", x.bandwidth())
  .attr("height", y.bandwidth())
  .attr("fill", d => statusColor[d.status])
  .attr("tabindex", 0)
  .attr("role", "img")
  .attr("aria-label", d => `${d.route} at ${d.time}: ${d.status}`)
  .style("cursor", "pointer")
  .on("mouseenter", function(event, d) {
    d3.select(this).attr("stroke", "var(--color-ink)").attr("stroke-width", 2);
    tooltip.style("opacity", 1)
      .html(`<strong>${d.route}</strong><br>${d.time} — ${d.status.charAt(0).toUpperCase() + d.status.slice(1)}`);
  })
  .on("mousemove", function(event) {
    tooltip.style("left", (event.pageX + 12) + "px").style("top", (event.pageY - 28) + "px");
  })
  .on("mouseleave", function() {
    d3.select(this).attr("stroke", "none");
    tooltip.style("opacity", 0);
  });
</script>
</body>
</html>
